front:
  text: 欽定四庫全書史部二
  hash: sha256:70556edeacc7a4d441da801d227722e616f1df1cbf685e5227e3ee4acfbaa8df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0001_WYG_000-1a, image: WYG0303/WYG0303-0001a.png}
body:
  text: 竹書紀年編年類提要臣等謹案竹書紀年二卷舊本稱為汲冡古書考晉書束晳𫝊晉咸和七年汲縣人發魏襄王冢得古書七十五卷中有竹書紀年十三篇今世所行題沈約注亦與隋志相符顧炎武考證之學最為精核所作日知録中往往引以為據然反覆推勘似非汲冢原書其中如平王東遷以後惟載晉事三家分晉以後惟載魏事是魏承晉史之明驗然晉靈公桃園之事董狐所書明見左𫝊孔子稱趙盾為法受惡足知未改史文乃今本所載仍以趙穿蔽獄則非晉史之舊也束晳𫝊稱竹書載夏年多殷益干啟位殺之今本皆無此文又杜預注左𫝊攜王奸命句引服䖍説以為伯服疏併引束晳説以為伯盤今本乃有余由之説使竹書原有此文不應二人皆未睹則非束晳杜預所見本也郭璞註穆天子𫝊引紀年七條以今本核之相同者三條璞稱紀年而今在注中者三條璞時不應先有注且三條併為一條文亦不屬其穆天子見西王母西王母止之曰有鳥聘人一條今本無之則非郭璞所見本也隋書經籍志曰紀年皆用夏正建寅之月為嵗首今本自入春秋以後時月並與經同全從周正則非隋時所見本也水經注引竹書七十六條皆以晉國紀年如春秋之為魯史而此本晉國之年皆附周下又所引出公六年荀瑶城宅陽梁惠王元年鄴師邯鄲師於平陽魏襄王六年秦取我焦及齊師伐趙東鄙圍中牟諸條今本皆無之其他年月亦多舛異則非酈道元所見本也史通引竹書文王殺季厯今本作文丁又引竹書鄭桓公厲王之子今本錫王子多父命居洛在宣王二十二年王子多父為鄭公在幽王二年皆不云厲王子則非劉知幾所見本也文選注引竹書五條今惟有太甲殺伊尹一條則非李善所見本也開元占經引竹書四條今本皆無則非瞿曇悉逹所見本也史記索隱引竹書晉出公二十三年奔楚乃立昭公之孫是為敬公今本作出公薨又引秦與衞戰雁門惠王後元十一年㑹齊于平阿十三年㑹齊于甄齊桓公君母齊宣公后宋易成肝廢君自立楮里疾圍蒲七條今本皆無則非司馬貞所見本也糓梁𫝊疏引竹書紀年周昭王膠舟之事以駁吕氏春秋今本但曰王陟無膠舟事則非楊士勛所見本也元豐九域志引竹書隂司馬敗燕公子翌於武垣一條今本亦無則非王存所見本也路史引竹書周武王年五十四辨武王年非九十三今本乃作九十三又注引竹書夏后不降六十九年證世紀五十九年之異今本乃亦作五十九路史又引梁惠成八年雨骨于赤鞞注又引夏桀末年社圻裂今本並無則非羅泌羅苹所見本也戰國䇿註引竹書魏救中山塞胥口今本無之則非鮑彪所見本也廣川書䟦引竹書秦穆公十一年取靈丘今本無之則非董逌所見本也雖其他證以竹書徃徃相合然𦙍征稱辰弗集於房説命稱舊學於甘盤均出梅賾古文尚書在西晉之後不應先見竹書豈亦明人抄合諸書以為之如十六國春秋類歟沈約注外又有小字夾行之注不知誰作中殷小庚一條稱約案史記作太庚則亦當為約説考元和郡縣志魏武定七年始置海州隋煬帝時始置衞縣而注舜在鳴條一條稱今海州夏啟十一年放武觀一條稱今頓丘衞縣則非約語矣又所注惟五帝三王最詳他皆寥寥而五帝三王皆全抄宋書符瑞志語約不應既著於史又不易一字移而為此本之註然則此注亦依托耳自明以來流傳已久姑録之以備一説其偽則終不可掩也乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
