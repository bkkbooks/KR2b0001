front:
  text: 八十六年司空入覲贄用玄圭八十七年初建十有二州八十九年作游宮于陶九十年帝游居于陶九十七年司空廵十有二州一百年帝陟于陶
  hash: sha256:745099e7fcf688cccbbfd18d765ab3f63f092d5f9e70f3414906655d391b92da
