body:
  text: 帝子丹朱避舜于房陵舜讓不克朱遂封于房爲虞賔三年舜卽天子之位帝舜有虞氏毋曰握登見大虹意感而生舜於姚墟目重瞳子故名重華龍顏大口黒色身長六尺一寸舜父毋憎舜使其􅂗廩自下焚之舜服鳥工衣服飛去又使浚井自上塡之以石舜服龍工衣自傍而出耕於歷夢眉長與髪等遂登庸元年巳未帝卽位居冀作大韶之樂卽帝位蓂莢生於階鳳凰巢於庭擊石拊石以歌九韶百獸率舞景星出于房地出乗黃之馬三年命咎陶作􅆿九年西王毋來朝西王毋之來朝獻白環玉玦十四年􅀸雲見命禹代虞事在位十有四年奏鐘石笙管未罷而天大靁􅀨疾風登屋拔木桴鼓播地鐘亂行舞人頓伏樂正狂走舜乃磬堵持衡而􅀏曰明哉天下非一人之天下也亦乃見于鐘石笙筦乎乃薦禹於天使行天子事也于時和氣普應慶雲興焉若烟非烟若雲非雲郁郁紛紛蕭索輪囷百工相和而歌卿雲帝乃倡之曰慶雲爛兮禮縵縵兮日月光華旦復旦兮羣臣咸進頓首曰明明上天爛然星陳日月光華弘于一人帝乃再歌曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷于聖賢莫不咸聽鼚乎鼓之軒乎舞之精華以竭褰裳去之於是八風循通慶雲叢聚蟠龍奮迅於其藏蛟魚踊躍於其淵龜鱉咸出其穴遷虞而事夏舜乃設壇於河依堯故事至于下昃榮光休至黃龍􅀒圖長三十二尺廣九尺出于壇畔赤文綠錯其文言當禪禹十五年帝命夏后有事于太室十七年春二月入學初用萬二十五年息愼氏來朝貢􅃓矢二十九年帝命子義鈞封于商三十年􅌾后育于渭三十二年帝命夏后總師遂陟方岳三十三年春正月夏后受命于神宗遂復九州三十五年帝命夏后征有苗有苗氏來朝四十二年玄都氏來朝貢寳玉四十七年冬隕霜不殺草木四十九年帝居于鳴條五十年帝陟義鈞封于商是謂商均后育娥皇也鳴條有蒼梧之山帝崩遂􅌾焉今海州帝禹夏后氏毋曰脩巳出行見流星貫昴夢接意感旣而吞神珠脩巳背剖而生禹於石紐虎鼻大口兩耳參鏤首戴鉤鈴􅅐有玉斗足文履巳故名文命長有聖德長九尺九寸夢自洗於河取水飲之又有白狐九尾之瑞當堯之世舜舉之禹觀於河有長人白面魚身出曰吾河精也呼禹曰文命治水言訖授禹河圖言治水之事乃退入于淵禹治水旣畢天錫玄珪以告成功夏道將興草木暢茂靑龍止於郊祝融之神降于崇山乃受舜禪卽天子之位洛出龜書是爲洪範三年喪畢都于陽城元年壬子帝卽位居冀頒夏時于邦國二年咎陶薨五年巡狩㑹諸侯于􅂗山南巡狩濟江中流有二黃龍􅀒舟舟人皆懼禹􅀏曰吾受命於天屈力以養人生性也死命也奚憂龍哉龍於是曵尾而逝八年春㑹諸侯于㑹稽殺防風氏夏六月􅀨金于夏邑秋八月帝陟于㑹稽禹立四十五年禹薦益於天七年禹崩三年喪畢天下歸啓帝啓元年癸亥帝卽位于夏邑大饗諸侯于鈞臺諸侯從帝歸于冀都大饗諸侯于璿臺二年費侯伯益出就國王帥師伐有扈大戰于甘有扈在始平鄠縣六年伯益薨祠之八年帝使孟涂如巴涖訟十年帝巡狩舞九韶于大穆之野十一年放王季子武觀于西河武觀卽五觀也觀國今蝢丘衞縣十五年武觀以西河叛彭伯壽帥師征西河武觀來歸十六年陟帝太康元年癸未帝卽位居斟鄩畋于洛表羿入居斟鄩四年陟帝仲康元年巳丑帝卽位居斟鄩五年秋九月庚戌朔日有食之命㣧侯帥師征羲和六年􅃬昆吾命作伯七年陟世子相出居商丘依邳侯一作依同姓諸侯斟灌斟鄩帝相元年戊戌帝卽位居商征淮夷二年征風及黃夷七年于夷來賔八年寒浞殺羿使其子澆居過九年相居于斟灌十五年商侯相土作乗馬遂遷于商丘二十年寒浞滅戈二十六年寒浞使其子澆帥師滅斟灌二十七年澆伐斟鄩大戰于濰覆其舟滅之二十八年寒浞使其子澆弑帝后緍歸于有仍伯靡出奔鬲斟灌之墟是爲帝丘后緍方娠逃出自竇歸于有仍伯靡奔有鬲氏夏世子少康生丙寅年少康自有仍奔虞乙酉年伯靡自鬲帥斟鄩斟灌之師以伐浞世子少康使汝艾伐過殺澆甲辰年伯子杼帥師滅戈伯靡殺寒浞少康自綸歸于夏邑乙巳年明年后緍生少康旣長爲仍牧正惎澆能戒之澆使椒求之將至仍少康逃奔有虞爲之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其德而兆其謀以􅀵夏衆撫其官職夏之遺臣伯靡自有鬲氏􅀵二斟之燼以伐浞浞恃澆皆康娛日忘其惡而不爲備少康使汝艾諜澆初浞娶純狐氏有子早死其婦曰女岐寡居澆強圉往至其戸陽有所求女岐爲之􅒌裳共舍而宿汝艾夜使人襲斷其首乃女岐也澆旣多力又善害艾乃畋獵放犬逐獸因嗾澆顚隕乃斬澆以歸于少康於是夏衆滅浞奉少康歸于夏邑諸侯始聞之立爲天子祀夏配天不失舊物帝少康元年丙午帝卽位諸侯來朝賔虞公二年方夷來賔三年復田稷后稷之後不窟失官至是而復十一年使商侯㝠治河十八年遷于原二十一年陟帝杼元年巳巳帝卽位居原五年自原遷于老丘八年征于東海及三壽得一狐九尾十三年商侯㝠死于河十七年陟杼或作帝宁一曰伯杼杼能帥禹者也故夏后氏報焉帝芬元年戊子帝卽位三年九夷來御十六年洛伯用與河伯馮夷鬭三十三年封昆吾氏子于有蘇三十六年作圜土四十四年陟芬或曰芬發帝芒元帝壬申帝卽位以玄珪賔于河十三年東狩于海獲大魚三十三年商侯遷于殷五十八年陟芒或曰帝荒帝泄帝元年辛未帝卽位十二年殷侯子亥賔于有易有易殺而放之十六年殷侯微以河伯之師伐有易殺其君綿臣殷侯子亥賔于有易而淫焉有易之君綿臣殺而放之故殷上甲微假師于河伯以伐有易滅之遂殺其君綿臣中葉衰而上甲微復興故殷人報焉二十一年命畎夷白夷玄夷風夷黃夷二十五年陟帝不降元年巳亥帝卽位六年伐九􅁐三十五年殷滅皮氏五十九年遜位于弟扄帝扄元年戊戌帝卽位十年帝不降陟三代之世內禪惟不降實有聖德十八年陟帝厪一名㣧甲元年巳未帝卽位居西河四年作西音昆吾氏遷于許巳姓名樊封于衞夏衰爲伯遷于舊許八年天有祅孽十日竝出其年陟帝孔甲元年乙巳帝卽位居西河廢豕韋氏使劉累豢龍三年王畋于萯山五年作東音七年劉累遷于魯陽王好事􅀑神肆行淫亂諸侯化之夏政始衰田于東陽萯山天大風晦肓孔甲迷惑入于民室主人方乳或曰后來見良日也之子必大吉或又曰不勝也之子必有殃孔甲聞之曰以爲余一人子夫誰殃之乃取其子以歸旣長爲斧所􅆷乃作破斧之歌是爲東音劉累所畜龍一雌死濳醢以食夏后夏后饗之旣而使求之懼而遷于魯陽其後爲范氏九年陟殷侯復歸于商丘帝昊昊一作臯元年庚辰帝卽位使豕韋氏復國夏衰昆吾豕韋相繼爲伯三年陟帝發一名后敬或曰發惠元年乙酉帝卽位諸夷賔于王門再保墉會于上池諸夷入舞七年陟泰山震帝癸一名桀元年壬辰帝卽位居斟鄩三年築傾宮毁容臺畎夷入于岐以叛六年岐踵戎來賔十年五星錯行夜中星隕如􅀨地震伊洛竭十一年㑹諸侯于仍有緡氏逃歸遂滅有緡十三年遷于河南初作輦十四年扁帥師伐岷山一作山民癸命扁伐山民山民女于桀二人曰琬曰琰后愛二人女無子焉斵其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰妺喜於傾宮飾瑶臺居之十五年商侯履遷于亳成湯元年十七年商使伊尹來朝二十年伊尹歸于商及汝鳩汝方㑹于北門二十一年商帥征有洛克之遂征荆荆降二十二年商侯履來朝命囚履于夏臺二十三年釋商侯履諸侯遂賔于商二十六年商滅溫二十八年昆吾氏伐商商㑹諸侯于景亳遂征韋商師取韋遂征顧太史令終古出奔商二十九年商師取顧三日竝出費伯昌出奔商冬十月鑿山穿陵以通于河三十年瞿山崩殺其大夫關龍逄商師征昆吾冬聆隧災三十一年商自陑征夏邑克昆吾大雷雨戰于鳴條夏師販績桀出奔三朡商師征三朡戰于郕獲桀于焦門放之于南巢自禹至桀十七世有王與無王用歲四百七十一年起壬子終壬戌殷商成湯名履湯有七名而九征放桀于南巢而還諸侯八譯而來者千八百國奇肱氏以車至乃同尊天乙履爲天子三讓遂卽天子之位初高辛氏之世妃曰簡狄以春分玄鳥至之日從帝祀郊禖與其妹浴於玄丘之水有玄鳥衘􅆗而墜之五色甚好二人競取覆以二筐簡狄先得而吞之遂孕􅅐剖而生契長爲堯司徒成功於民受封於商後十三世生主癸主癸之妃曰扶都見白氣貫月意感以乙日生湯號天乙豐下銳上晢而有䫇句身而揚聲長九尺臂有四肘是爲成湯湯在亳能脩其德伊摯將應湯命夢乗船過日月之傍湯乃東至于洛觀帝堯之壇沈璧退立黃魚􅀟踴黒鳥隨之止于壇化爲黒玉又有黒龜竝赤文成字言夏桀無道湯當代之檮杌之神見于邳山有神牽白狼衘鉤而入商朝金德將盛銀自山溢湯將奉天命放桀夢及天而䑛之遂有天下商人後改天下之號曰殷十八年癸亥王卽位居亳始屋夏社十九年大旱氐羗來賔二十年大旱夏桀卒于亭山禁弦歌舞二十一年大旱鑄金幣二十二年大旱二十三年大旱二十四年大旱王禱于桑林雨二十五年作大濩樂初巡狩定獻令二十七年遷九鼎于商邑二十九年陟外丙名勝元年乙亥卽位居亳命􅀸士伊尹二年陟仲壬名庸元年丁丑王卽位居亳命鄕士伊尹四年陟太甲名至元年辛巳王卽位居亳命卿士伊尹伊尹放太甲于桐乃自立約按伊尹自立蓋誤以攝政爲眞爾七年王濳出自桐殺伊尹天大霧三日乃立其子伊陟伊奮命復其父之田宅而中分之約按此文與前後不􅀋蓋後世所益十年大饗于太廟初祀方明十二年陟沃丁名絢元年癸巳王卽位居亳命卿士咎單八年祠保衡十九年陟小庚約按史記作太庚名辨元年壬子王卽位居亳五年陟小甲名高元年丁巳王卽位居亳十七年陟雍巳名伷元年甲戌王卽位居亳十二年陟太戊名密元年丙戌王卽位居亳命卿士伊陟臣扈七年有桑榖生于朝十一年命巫咸禱于山川二十六年西戎來賔王使王孟聘西戎三十一年命費侯中􅄛爲車正三十五年作寅車四十六年大有年五十八年城蒲姑六十一年東九夷來賔七十五年陟大戊遇祥桑側身脩行三年之後遠方慕明德重譯而至者七十六國商道復興廟爲中宗竹書作太宗仲丁名莊元年辛丑王卽位自亳遷于􅅝于河上六年征藍夷九年陟外壬名發元年庚戌王卽位居􅅝邳人姺人叛十年陟河亶甲名整元年庚申王卽位自􅅝遷于相三年彭伯克邳四年征藍夷五年侁人入于班方彭伯韋伯伐班方侁人來賔九年陟祖乙名􅅬元年巳巳王卽位自相遷于耿命彭伯韋伯二年圯于耿自耿遷于庇三年命卿士巫賢八年城庇十五年命邠侯高圉十九年陟祖乙之世商道復興廟爲中宗史記與無逸皆無之祖辛名旦元年戊子王卽位居庇十四年陟開甲史記作沃甲名踰元年壬寅王卽位居庇五年陟祖丁名新元年丁未王卽位居庇九年陟南庚名更元年丙辰王卽位居庇三年遷于奄六年陟陽甲一名和甲名和元年壬戌王卽位居奄三年西征丹山戎四年陟盤庚名旬元年丙寅王卽位居奄七年應侯來朝十四年自奄遷于北蒙曰殷十五年營殷邑十九年命邠侯亞圉二十八年陟小辛名頌元年甲午王卽位居殷三年陟小乙名斂元年丁酉王卽位居殷六年命世子武丁居于河學于甘盤十年陟武丁名昭元年丁未王卽位居殷命卿士甘盤三年夢求傅說得之六年命卿士傅說視學養老十二年報祀上甲微二十五年王子孝巳卒于野二十九年肜祭太廟有雉來三十二年伐􅀑方次于荆三十四年王師克􅀑方氐羗來賔四十三年王師滅大彭五十年征豕韋克之五十九年陟王殷之大仁也力行王道不敢荒寧嘉靖殷邦至于大小無時或怨是時輿地東不過江黃西不過氐羗南不過荆蠻北不過朔方而頌聲作禮廢而復起廟號高宗祖庚名曜元年丙午卽位居殷作高宗之訓十一年陟祖甲國語作帝甲名載元年丁巳王卽位居殷十二年征西戎冬王返自西戎祖甲西征得一丹山十三年西戎來賔命邠侯組紺二十四年重作湯􅆿二十七年命王子􅅝王子良三十三年陟王舊在野及卽位知小人之依能保惠庶民不侮鰥寡迨其末也繁􅆿以攜遠殷道復衰國語曰玄王勤商十有四世帝甲亂之七世而隕馮辛史記作廩辛名先元年庚寅王卽位居殷四年陟庚丁名􅅝元年甲午王卽位居殷八年陟武乙名瞿元年壬寅王卽位居殷邠遷于􅄮周三年自殷遷于河北命周公亶父賜以岐邑十五年自河北遷于沬二十一年周公亶父薨二十四年周師伐程戰于畢克之三十年周師伐義渠乃獲其君以歸三十四年周公季歷來朝王賜地三十里玉十㲄馬十匹三十五年周公季歷伐西落􅀑戎王畋于河渭大雷震死文丁史記作太丁非名托元年丁丑王卽位居殷自沬歸殷邑二年周公季歷伐燕京之戎敗績三年洹水一日三絶四年周公季歷伐余無之戎克之命爲牧師五年周作程邑七年周公季歷伐始呼之戎克之十一年周公季歷伐翳徒之戎獲其三大夫來獻捷王殺季歷王嘉季歷之功錫之圭瓉秬鬯九命爲伯旣而執諸塞庫季歷囷而死因謂文丁殺季歷執王季於塞庫羈文王於玉門鬱尼之情辭以作歌其傳乆矣十二年周文公元年有鳳集於􅄮山十三年陟帝乙名羡元年庚寅王卽位居殷三年王命南仲西拒昆夷城朔方夏六月周地震九年陟帝辛名受卽紂也一日受辛元年巳亥王卽位居殷命九侯周侯邘侯周侯爲西伯昌三年有雀生鸇四年大蒐于黎作炮烙之􅆿五年夏築南單之臺􅀨土于亳六年西伯初禴于畢九年王師伐有蘇獲妲巳以歸作瓊室立玉門十年夏六月王畋于西郊十七年西伯伐翟冬王遊於淇二十一年春正月諸侯朝周伯夷叔齊自孤竹歸于周二十二年冬大蒐于渭二十三年囚西伯于羑里二十九年釋西伯諸侯逆西伯歸于程三十年春三月西伯率諸侯入貢三十一年西伯治兵于畢得呂尚以爲師三十二年五星聚于房有赤鳥集于周社密人侵阮西伯帥師伐密三十三年密人降于周師遂遷于程王􅃬命西伯得專征伐約按文王受命九年大統未集蓋得專征伐受命自此年始三十四年周師取耆及邘遂伐崇崇人降冬十二月昆夷侵周三十五年周大饑西伯自程遷于豐三十六年春正月諸侯朝于周遂伐昆夷西伯使世子發營鎬三十七年周作辟雍三十九年大夫辛甲出奔周四十年周作靈臺王使膠鬲求玉于周四十一年春三月西伯昌薨周文王􅌾畢畢西於豐三十里四十二年周武王元年西伯發受丹書于呂尚有女子化爲丈夫四十三年春大閱嶢山崩四十四年西伯發伐黎四十七年內史向摯出奔周四十八年夷羊見二日竝出五十一年冬十一月戊子周師渡盟津而還王囚箕子殺王子比干微子出奔五十二年庚寅周始伐殷秋周師次于鮮原冬十有二月周師有事于上帝庸蜀羗髳微盧彭濮從周師伐殷伐殷至郉丘更名郉丘曰懷湯滅夏以至于受二十九王用歲四百九十六年起癸亥終戊寅竹書紀年卷上竹書紀年卷下周武王名發初高
