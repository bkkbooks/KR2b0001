seq: 2
front:
  text: 辛氏之世妃曰姜嫄􅂇祭郊禖見
  hash: sha256:95dab176abfe13d96cfe960d255fff1b98bfa709cad066acd7697f49a2f10c97
body:
  text: 大人迹􅂂之當時歆如有人道感已遂有身而生男以爲不祥棄之阨巷羊牛避而不踐又送之山林之中會伐林者又取而置寒冰上大鳥以一翼籍覆之姜嫄以爲異乃􅀵養焉名之曰棄枝頥有異相長爲堯稷官有功於民后稷之孫曰公劉有德諸侯皆以天子之禮待之初黃帝之世䜟言曰西北爲王期在甲子昌制命發行誅旦行道及公劉之後十三世而生季歷季歷之十年飛龍盈於殷之牧野此蓋聖人在下位將起之符也季歷之妃曰大任夢長人感巳􅘞于豕牢而生昌是爲周文王龍顏虎肩身長十尺􅅐有四乳大王曰吾世當有興者其在昌乎季歷之兄曰太伯知天命在昌適越終身不反弟仲雝從之故季歷爲嗣以及昌昌爲西伯作邑于豐文王之妃曰太姒夢商庭生􅁄太子發植梓樹於闕間化爲松栢棫柞以告文王文王幣率羣臣與發竝拜告夢季秋之甲子赤爵銜書及豐置于昌戸昌拜稽首受其文要曰􅁎昌蒼帝子亡殷者紂王將畋史編卜之曰將大􅀗非熊非罷天遣大師以佐昌臣太祖史疇爲禹卜畋得臯陶其兆􅀋此至于磻溪之水呂尚釣於涯王下趨拜曰望公七年乃今見光景于斯尚立變名荅曰望釣得玉璜其文要曰􅁎受命昌來提撰爾洛鈴報在齊尚出游見赤人自洛岀授尚書命曰召佐昌者子文王夢日月著其身又鸑鷟鳴於􅄮山孟春六旬五緯聚房後有鳳凰銜書游文王之都書又曰殷帝無道虐亂天下星命巳移不得復久靈祇遠離百神吹去五星聚房昭理四海文王旣沒太子發代立是爲武王武王騈齒望羊將伐紂至于孟津八百諸侯不期而會咸曰紂可伐矣武王不從及紂殺比干囚箕子微子去之乃伐紂度孟津中流白魚躍入王舟王俯取魚長三尺目下有赤文成字言紂可伐王寫以世字魚文消燔魚以告天有火自天止于王屋流爲赤烏烏銜穀焉穀者紀后稷之德火者燔魚以告天天火流下應以告也遂東伐紂勝於牧野兵不血刃而天下歸之乃封呂尚於齊周德旣隆草木茂盛蒿堪爲宮室因名蒿室旣有天下遂都于鎬十二年辛􅆗王率西夷諸侯伐殷敗之于􅴮野王親禽受于南單之臺遂分天之明立受子祿父是爲武庚夏四月王歸于豐饗于太廟命監殷遂狩於管作大武樂十三年巢伯來賔薦殷于大廟遂大封諸侯秋大有年十四年王有疾周文公禱于壇墠作金縢十五年肅愼氏來賔初狩方岳誥于沫邑冬遷九鼎于洛十六年箕子來朝秋王師滅蒲姑十七年命王世子誦于東宮冬十有二月王陟年五十四成王名誦元年丁酉春正月王卽位命􅃁宰周文公總百官庚午周公誥諸侯于皇門夏六月􅌾武王于畢秋王加元服武庚以殷叛周文公出居于東二年奄人徐人及淮夷入于邶以叛秋大雷電以風王逆周文公于郊遂伐殷三年王師滅殷殺武庚祿父遷殷民于衞遂伐奄滅蒲姑姑與四國作亂故周文公伐之四年春正月初朝于廟夏四月初甞麥王師伐淮夷遂入奄五年春正月王在奄遷其君于蒲姑夏五月王至自奄遷殷民于洛邑遂營成周六年大蒐于􅄮陽七年周公復政于王春二月王如豐三月召康公如洛度邑甲子周文公誥多士于成周遂城東都王如東都諸侯來朝冬王歸自東都立高圉廟八年春正月王初莅阼親政命魯侯禽父齊侯伋遷庶殷于魯作象舞冬十月王師滅唐遷其民于杜九年春正月有事于太廟初用勺肅愼氏來朝王使榮伯錫肅愼氏命十年王命唐叔虞爲侯越裳氏來朝周文公出居于豐十一年春正月王如豐唐叔獻嘉禾王命唐叔歸禾于周文公王命周平公治東都約按周平公卽君陳周公之子伯禽之弟十二年王帥燕師城韓王錫韓侯命十三年王師㑹齊侯魯侯伐戎夏六月魯大禘于周公廟十四年秦師圍曲城克之冬洛邑告成十八年春正月王如洛邑定鼎鳳凰見遂有事于河武王沒成王少周公旦攝政七年制禮作樂神鳥鳳凰見蓂筴生乃與成王觀于河洛沈璧禮畢王退俟至于日昃榮光竝出幕河靑雲浮至靑龍臨壇銜玄甲之圖坐之而去禮于洛亦如之玄龜靑龍蒼光止于壇背甲刻書赤文成字周公援筆以世文寫之書成文消龜隨甲而去其言自周公訖于秦漢盛衰之符麒麟逰􅁐鳳凰翔庭成王授琴而歌曰鳳凰翺兮於紫庭余何德兮以感靈賴先王兮恩澤臻于胥樂兮民以寧十九年王巡狩侯甸方岳召康公從歸于宗周遂正百官黜豐侯二十一年除治象周文公薨于豐二十二年􅌾周文公于畢二十四年於越來賔二十五年王大會諸侯于東都四夷來賔冬十月歸自東都有事于太廟三十年離戎來賔約按離戎驪山之戎也爲林氏所伐告于成王三十三年王逰于卷阿召康公從歸于宗周命王世子釗如房逆女房伯祈歸于宗周三十四年雨金于咸陽約按咸陽天雨金三年國有大喪三十七年夏四月乙丑王陟康王名釗元年甲戌春正月王卽位命􅃁宰召康公總百官諸侯朝于豐宮三年定樂歌吉禘于先王申戒農官告于廟六年齊太公薨九年唐遷于晉作宮而美王使人讓之十二年夏六月壬申王如豐錫畢公命秋毛懿公薨十六年錫齊侯伋命王南巡狩至九江廬山十九年魯侯禽父薨二十一年魯築茅闕門二十四年召康公薨二十六年秋九月巳未王陟昭王名瑕元年庚子春正月王卽位復設象魏六年王錫郇伯命冬十二月桃李華十四年夏四月恒星不見秋七月魯人弑其君宰十六年伐楚渉漢遇大兕十九年春有星孛于紫微祭公辛伯從王伐楚天大曀雉兎皆震喪六師于漢王陟穆王名滿元年巳未春正月王卽位作昭宮命辛伯餘靡冬十月築祇宮于南鄭自武王至穆王享國百年穆王以下都于西鄭六年春徐子誕來朝􅃬命爲伯八年春北唐來賔獻一驪馬是生騄耳九年築春宮王所居有鄭宮春宮十一年王命􅀸士祭公謀父十二年毛公班共公利逄公固帥師從王伐犬戎冬十月王北巡狩遂征犬戎十三年春祭公帥師從王西征次于陽紆秋七月西戎來賔徐戎侵洛冬十月造父御王入于宗周十四年王帥楚子伐徐戎克之夏四月王畋于軍丘五月作范宮秋九月翟人侵畢冬蒐于萍澤作虎牢十五年春正月留昆氏來賔作重壁臺冬王觀于鹽澤一作王幸安邑觀鹽池非是十六年霍侯舊薨王命造父封于趙十七年王西征昆侖丘見西王毋其年西王毋來朝賔于昭宮秋八月遷戎于太原王北征行流沙千里積羽千里征犬戎取其五王以東西征于靑鳥所觧三危山西征還履天下億有九萬里十八年春正月王居祇宮諸侯來朝二十一年祭文公薨二十四年王命左史戎夫作記三十五年荆人入徐毛伯遷帥師敗荆人于泲三十七年大起九師東至于九江架黿鼉以爲梁遂伐越至于紆荆人來貢三十九年王會諸侯于􅂗山四十五年魯侯㵒薨五十一年作呂刑命甫侯于豐五十五年王陟于祇宮共王名繄元年甲寅春正月王卽位四年王師滅密九年春正月丁亥王使內史良􅃬毛伯遷命十二年王陟懿王名堅元年丙寅春正月王卽位天再旦于鄭七年西戎侵鎬十三年翟人侵岐十五年王自宗周遷于槐里十七年魯厲公擢薨二十一年虢公帥師北伐犬戎敗逋二十五年王陟懿王之世興居無節號令不時挈壷氏不能共其職諸侯於是攜德孝王名辟方元年辛卯春正月王卽位命申侯伐西戎五年西戎來獻馬七年冬大雨電江漢水牛馬死是年厲王生八年初牧于􅊈渭九年王陟夷王名爕元年庚子春正月王卽位二年蜀人呂人來獻瓊玉賔于河用介珪三年王致諸侯烹齊哀公于鼎六年王獵于社林􅀗犀牛一以歸七年虢公帥師伐太原之戎至于俞泉􅀗馬千匹冬雨雹大如礪楚子熊渠代庸至于鄂八年王有疾諸侯祈于山川王陟厲王名胡居􅇾有汾水焉故又曰汾王元年戊申春正月王卽位作夷宮命􅀸士榮夷公落楚人來獻龜貝三年淮夷侵洛王命虢公長父伐之不克齊獻公山薨六年楚子延卒八年初監謗苪伯良夫戒百官于朝十一年西戎入于犬丘十二年王亡奔􅇾國人圍王宮執召穆公之子殺之十三年王在彘共伯和攝行天子事號曰共和十四年玁狁侵宗周西鄙召穆公帥師追荆蠻至于洛十六年蔡武侯薨楚子勇卒十九年曹夷伯薨二十二年大旱陳幽公薨二十三年大旱宋僖公薨二十四年大旱􅂎武公薨二十五年大旱楚子嚴卒二十六年大旱王陟于􅇾周定公召穆公立太子靖爲王共伯和歸其國遂大雨大旱旣久廬舍俱焚㑹汾王崩卜于太陽兆曰厲王爲􅑂周公召公乃立太子靖共和遂歸國和有至德尊之不喜廢之不怒逍遥得志于共山之首宣王名靖元年甲戍春正月王卽位周定公召穆公輔政復田賦作戎車燕惠侯薨二年錫大師皇父司馬休父命魯愼公薨曹公子蘇弑其君幽伯疆三年王命大夫仲伐西戎齊武公壽薨四年王命蹶父如韓韓侯來朝五年夏六月尹吉甫帥師伐玁狁至于太原秋八月方叔帥師伐荆蠻六年召穆公帥師伐淮夷王帥師伐徐戎皇父休父從王伐徐戎次于淮王歸自伐徐錫召穆公命西戎殺秦仲楚子霜卒七年王錫申伯命王命樊侯仲山甫城齊八年初考室魯武公來朝錫魯世子戲命九年王㑹諸侯于東都遂守于甫十二年魯武公薨齊人弑其君厲公無忌立公子赤十五年衞􅁵侯薨王錫虢文公命十六年晉遷于絳十八年蔡夷侯薨二十一年魯公子伯御弑其君懿公戲二十二年王錫王子多父命居洛二十四年齊文公赤薨二十五年大旱王禱于郊廟遂雨二十七年宋惠公覸薨二十八年楚子狥卒二十九年初不藉千畝三十年有兎舞于鎬京三十二年王師伐魯殺伯御命孝公稱于夷宮陳僖公孝薨有馬化爲人三十三年齊成公薨王師伐太原之戎不克三十七年有馬化爲狐燕僖侯卒楚子鄂卒三十八年王師及晉穆侯伐條戎奔戎王師敗逋三十九年王師伐姜戎戰于千畝王師敗逋四十年料民于太原戎人滅姜邑晉人敗北戎于汾隰四十一年王師敗于申四十三年王殺大夫杜伯其子隰叔出奔晉晉穆侯費生薨弟殤叔自立世子仇出奔四十四年晉殤叔元年丁巳四十六年王陟幽王名􅄺元年庚申春正月王卽位晉世子仇歸于晉殺殤叔晉人立仇是爲文侯王錫太師尹氏皇父命二年辛酉晉文侯元年涇渭洛竭􅄮山崩初增賦晉文侯同王子多父伐鄫克之乃居鄭父之丘是爲鄭桓公三年王嬖褒姒冬大震電四年秦人伐西戎夏六月隕霜陳夷公薨五年王世子宜臼出奔申皇父作都于向六年王命伯士帥師伐六濟之戎王師敗逋西戎滅蓋冬十月辛卯朔日有食之七年虢人滅焦八年王錫司徒鄭伯多父命王立褒姒之子曰伯服爲太子九年申侯聘西戎及鄫十年春王及諸侯盟于太室秋九月桃杏實王師伐申十一年春正月日暈申人鄫人及犬戎入宗周弑王及鄭桓公犬戎殺王子伯服執褒姒以歸申侯魯侯許男鄭子立宜臼于申虢公翰立王子余臣于攜是爲攜王二王竝立武王滅殷歲在庚寅二十四年歲在甲寅定鼎洛邑至幽王二百五十七年共二百八十一年自武王元年巳卯至幽王庚午二百九十二年平王名宜臼自東遷以後始紀晉事王卽位皆不書元年辛未王東徙洛邑錫文侯命晉侯會衛侯鄭伯秦伯以師從王入于成周二年秦作西畤魯孝公薨賜秦晉以邠􅄮之田三年齊人滅祝王􅃬司徒鄭伯命四年燕傾侯卒鄭人滅虢五年秦襄公帥師伐戎卒于師宋戴公薨六年燕哀侯卒鄭遷於溱洧七年楚子儀卒八年鄭殺其大夫關其思十年秦還于􅊈渭十三年魏武公薨十四年晉人滅韓十八年秦文公大敗戎師于􅄮來歸􅄮東之田二十一年晉文侯殺王子余臣于攜二十三年宋武公卒二十四年秦作陳寳祠二十五年晉文侯薨秦初用族􅆿二十六年丙申晉昭侯元年晉封其弟成師于曲沃三十二年晉潘父弑其君昭侯納成師不克立昭侯之子孝侯晉人殺潘父三十三年癸􅆗晉孝侯元年楚人侵申三十六年衞莊公卒王人戍申四十年齊莊公卒晉曲沃桓叔成師卒子鱓立是爲莊伯自是晉侯在翼稱翼侯四十一年辛亥莊伯元年春大雨雪四十二年狄人伐翼至于晉郊宋襄公薨魯惠公使宰讓請郊廟之禮王使史角如魯諭止之四十七年晉曲沃莊伯入翼弑孝侯晉人逐之立孝侯子郤是爲鄂侯四十八年戊午晉鄂侯郤元年無雲而雷魯惠公卒四十九年巳未魯隱公元年春秋始此魯隱公及邾莊公盟于姑蔑五十一年春二月乙巳日有食之三月庚戌王陟桓王名林元年壬戌十月莊伯以曲沃叛伐翼公子萬救翼荀叔軫追之至于家谷翼侯焚曲沃之禾而還翼侯伐曲沃大捷武公請成于翼至相而還相一作桐二年王使虢公伐晉之曲沃晉鄂侯卒曲沃莊伯復攻晉立鄂侯子光是爲哀侯公子萬救翼荀叔軫追之至于家谷三年甲子晉哀侯光元年四年曲沃莊伯卒子稱立是爲武公尚一軍五年曲沃武公元年芮人乗京荀人董伯皆叛曲沃十一年晉小子侯元年曲沃􅀗晉哀侯晉人立哀侯子爲小子侯芮伯萬岀奔魏萬之毋逐萬十二年王師秦師圍魏取芮伯萬而東之十三年冬曲沃伯誘晉小子侯殺之晉曲沃滅荀以其地賜大夫原氏黯是爲荀叔戎人逆芮伯萬于郊十四年王命虢仲伐曲沃立晉哀侯弟緡于翼爲晉侯十五年晉侯緡元年十六年春滅翼十九年鄭莊公卒二十三年三月乙未王陟莊王名佗元年乙酉曲沃尚一軍異於晉六年五月􅌾桓王十五年王陟􅁵王名胡齊元年庚子春齊桓公會諸侯于北杏以平宋亂三年曲沃武公滅晉侯緡以寳獻王王命武公以一軍爲晉侯四年晉武公二十八年晉猶不與齊桓公之盟左傅註晉侯緡是年滅五年晋武公卒子詭諸立爲獻公王陟惠王名閬元年乙巳晉獻公元年晉獻公朝王如成周周陽白兎舞于市二年王子頽亂王居于鄭鄭人入王府多取玉玊化爲蜮射人九年晉城絳十六年晉獻公作二軍滅耿以賜大夫趙夙滅魏以賜大夫畢萬晉滅於大夫趙韓魏萌於此十七年衞懿公及赤狄戰于泂澤洞當作泂十九年晉獻公會虞師伐虢滅下陽虢公醜奔衞公命瑕父呂甥邑于國都二十五年春正月狄人伐晉王陟襄王元年庚午晉獻公卒立奚齊里克殺之及卓子立夷吾二年辛未晉惠公元年晉殺里克三年雨金于晉七年秦伯渉河伐晉十五年晉惠公卒子懷公圉立秦穆公帥師送公子重耳圍令狐桑泉臼衰皆降爲秦師狐毛與先軫禦秦至于廬柳乃謂秦穆公使公子縶來與師言次子郇盟于軍公子重耳渉自河曲十六年乙酉晉文公元年晉殺子圉十七年晉城荀二十年周襄王㑹諸侯于河陽二十二年齊師逐鄭太子齒奔城張南鄭二十四年晉文公卒二十五年甲午晉襄公驩元年三十年洛絕于泂三十一年晉襄公卒三十二年辛丑晉靈公夷臯元年三十三年王陟頃王元年癸􅆗六年彗星入北斗王陟匡王元年巳酉六年王陟晉靈公爲趙穿所殺趙盾使穿迎公子黑臋于周立之定王元年乙􅆗晉成公元年六年晉成公與狄伐秦􅀗秦諜殺之絳市六日而蘇七年晉成公卒于扈八年壬戌晉景公元年十八年齊國佐來獻玊磬紀公之甗二十一年王陟簡王元年丙子五年晉景公卒六年辛巳晉厲公元年十三年晉厲公卒楚共王會宋平公于湖陽十四年巳丑晉悼公元年王陟靈王元年庚寅十四年晉悼公卒十五年甲辰晉平公元年二十七年王陟景王元年丁巳十三年春有星出婺女十月晉平公卒十四年庚午晉昭公元年河水赤于龍門三里十九年晉昭公卒冬十二月桃杏花二十年晉頃王元年二十五年晉頃公平王室亂立敬王敬王元年壬午八年晉頃公卒九年庚寅晉定公元年十四年漢不見于天二十六年晉靑虹見二十八年洛絕于周二十六年淇絕于舊衞三十九年晉城頓丘四十三年宋殺其大夫皇瑗于丹水之上丹水壅不流四十四年王陟元王元年丙寅晉定公卒二年晉岀公元年四年於越滅吳六年晉澮絕于梁丹水三日絕不流七年齊人鄭人伐衞王陟貞定王元年癸酉於越徙都瑯琊四年十一月於越子勾踐卒是爲菼執次鹿郢立六年晉河絕于扈七年晉荀瑶城南梁一本岀公公二十年十年於越子鹿郢卒不壽立十一年晉出奔齊十二年河水赤三日荀瑶伐中山取窮魚之丘十三年晉韓龎取秦武城十六年晉出公二十二年十七年晉岀公薨乃立昭公之孫是爲敬公十八年巳丑晉敬公元年二十年於越子不壽見殺是爲盲姑次朱勾立二十二年楚滅蔡二十四年楚滅􅂎二十八年晉敬公十一年王陟考王元年敬公十八年魏文侯立十年楚滅莒十一年晉敬公卒十二年晉幽公柳元年魯悼公卒十四年魯季孫會晉幽公于楚丘十五年王陟威烈王元年丙辰三年晉大旱地生鹽五年晉丹水岀反潔六年晉大夫秦嬴賊幽公於高寢之上魏文侯立幽公子止七年壬戌晉烈公元年趙獻子城泫氏韓武子都平陽八年趙城平邑九年楚人伐我南鄙至于上洛十一年田公子居思伐邯鄲圖平邑於越滅滕十二年於越子朱勾伐郯以郯子鴣歸十四年於越子朱勾卒子翳立十六年齊田盻及邯鄲韓舉戰于平邑邯鄲之師敗逋遂􅀗韓舉平邑新城十七年魏文侯伐秦至鄭還築汾隂郃陽田悼子卒田布殺其大夫公孫孫公孫孫以廩丘叛于趙田布圍廩丘翟角趙孔屑韓氏救廩丘及田布戰于龍澤田師敗逋十八年王命韓景子趙烈子及我師伐齊入長垣二十三年王命晉卿魏氏趙氏韓氏爲諸侯二十四年王陟安王元年庚辰九年晉烈公卒子桓公立韓非子作桓侯十年已丑晉桓公頃元年十五年魏文侯卒在位五十年大風晝昏晉太子喜岀奔十六年乙未魏武侯擊元年封公子緩二十一年韓滅鄭哀侯入于鄭二十三年於越遷于吳二十六年王陟魏城洛陽及安邑王垣七月於越太子諸咎弑其君翳十月越人殺諸咎越滑吳人立孚錯枝爲君烈王元年丙午魏公子緩如邯鄲以作難邯鄲趙地名於越大夫寺區定越亂立初無余是爲莾安二年秦胡蘇帥師伐韓韓將韓襄敗胡蘇于酸水魏觴諸侯于范臺晉桓公邑哀侯于鄭韓山堅賊其君哀侯六年辛亥梁惠成王元年韓共侯趙成侯遷晉桓公于屯留以後更無晉事趙成侯􅅯韓懿侯若伐我葵鄈城七年王陟我師伐趙圍蜀陽齊田壽帥師伐我圍觀觀降魏大夫王錯出奔韓顯王元年癸丑鄭城邢丘自此韓改稱曰鄭秦子向命爲藍君二年河水赤于龍門三日三年公子景賈帥師伐鄭韓明戰于韓我師敗逋四年夏四月甲寅徙邦于大梁王發逄忌之藪以賜民於越寺區弟思弑其君莾安次無顓立五年雨碧于郢地忽長十丈有餘高尺半六年我師伐邯鄲取列人我師伐邯鄲取肥雨黍于齊七年我與邯鄲趙榆次陽邑王會鄭􅁵侯于巫沙八年入河水于圃田又爲太溝而引圃水瑕陽人自秦導岷山靑衣水來歸九年秦師伐鄭次于懷城殷十年楚師出河水以氷長垣之外龍賈帥師築長城于西邊鄭取屯留尚子十一年鄭􅁵侯使許息來致地平丘戸牗首垣諸邑及鄭馳地我取枳道與鄭鹿王及鄭􅁵侯盟于巫沙以釋它陽之圍歸􅁵于鄭十二年魯恭侯宋桓侯衞成侯鄭􅁵侯來朝於越子無顓卒是爲菼蠋􅆗次無疆立十三年邯鄲成侯會燕成侯于安邑十四年秦公孫壯伐鄭圍焦城不克秦公孫壯帥師城上枳安陵山民邯鄲伐衞取漆富兵城之齊師及燕戰于泃水齊師遁十五年齊田期伐我東鄙戰于桂陽我師敗逋東周與鄭高都鄭􅁵侯來朝中陽宋景鼓衞公孫倉㑹師圍我襄陵十六年王以韓師諸侯帥縣于襄陵齊侯使楚景舍來求成邯鄲之師敗我師于桂陵秦伐韓閼與惠成王使趙破之不知是何年十七年燕伐趙圍濁鹿趙靈王及代人救濁鹿敗燕師于勺晉取玄武濩澤卽雷澤舜漁處十八年齊築房以爲長城十九年王如衞命公子南爲侯二十年二十一年魏殷臣趙公孫裒伐燕還取夏屋城曲逆二十二年壬寅孫何侵楚人三戸乳楚伐徐州二十三年魏章帥師及鄭師伐楚取上蔡孫何取㶏陽秦孝公會諸侯于逄澤絳中地􅠂西絕于汾二十四年魏敗韓馬陵二十五年二十六年穰疪帥師及鄭孔夜戰于梁赫鄭師敗逋與齊田盻戰于馬陵二十七年五月齊田盻及宋人伐我東鄙圍平陽九月秦衞鞅伐我西鄙十月邯鄲伐我北鄙王攻衞鞅我師敗逋二十八年城濟陽秦封衞鞅于鄥改名曰尚二十九年邳遷于薛三月爲大溝于北郛以行圃田之水三十年三十一年秦蘇胡帥師伐鄭韓襄敗秦蘇胡于酸水不知何年附此三十二年三十三年鄭威侯與邯鄲圍襄陵三十四年魏惠成王三十六年改元稱一年王與諸侯會于徐州於越子無疆伐楚三十五年楚吾得帥師及秦伐鄭圍綸氏不知何年附此三十六年楚圍齊於徐州遂伐於越殺無疆三十七年三十八年龍賈及秦師戰于雕隂我師敗逋王會鄭威侯于巫沙三十九年秦取我汾隂皮氏四十年四十一年秦歸我焦曲沃四十二年九鼎淪泗沒于淵四十三年四十四年四十五年楚敗我襄陵四十六年四十七年四十八年王陟愼靚王元年辛丑秦取我曲沃平周二年魏惠成王薨三年今王元年四年五年六年鄭侯使韓辰歸晉陽及向二月城陽向更名陽爲河雍向爲高平隱王史記作赧王名延蓋赧隱聲相近元年丁未十月鄭宣王來朝梁燕子之殺公子平不克齊師殺子之醢其身二年齊地景長長丈餘高一尺魏以張儀爲相三年韓明帥師伐襄丘秦王來見于蒲坂關四月越王使公師隅來獻舟三百箭五百萬及犀角象齒五月張儀卒四月翟章伐衞魏敗趙將韓舉五年洛入成周山水大出六年十月大霖雨疾風河水酸􅀥楚庶章帥師來會我次于襄丘七年翟章救鄭次于南屈此年未的八年秦公孫爰帥師伐我皮氏翟章帥師救皮氏圍疾西風九年城皮氏十年十一年十二年秦拔我蒲坂晉陽封谷十三年邯鄲命吏大夫奴遷于九原將軍大夫適子代史皆貂服十四年十五年薛侯來會王于釡丘楚入雍氏楚人敗十六年王與齊王會于韓今王終二十年竹書紀年卷下終
