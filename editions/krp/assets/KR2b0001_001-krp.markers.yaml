  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR2b0001_krp_001-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR2b0001_WYG_001-1a01}
  - {type: variant, offset: 0, length: 1432, content: 欽定四庫全書竹書紀年卷上梁沈約注黄帝軒轅氏母曰附寳見大電繞北斗樞星光照郊野感而孕二十五月而生帝於夀丘弱而能言龍顔有聖徳劾百神朝而使之應龍攻蚩尤戰虎豹熊羆四獸之力以女魃止淫雨天下既定聖徳光被羣瑞畢臻有屈軼之草生於庭佞人入朝則草指之是以佞人不敢進元年帝即位居有熊初制冕服二十年景雲見以雲紀官有景雲之瑞赤方氣與青方氣相連赤方中有兩星青方中有一星凡三星皆黄色以天清明時見於攝提名曰景星帝黄服齋於中宫坐於𤣥扈洛水之上有鳯凰集不食生蟲不履生草或止帝之東園或巢於阿閣或鳴於庭其雄自歌其雌自舞麒麟在囿神鳥来儀有大螻如羊大螾如虹帝以土氣勝遂以土徳王五十年秋七月庚申鳯鳥至帝祭于洛水庚申天露三日三夜晝昏帝問天老力牧容成曰於公何如天老曰臣聞之國安其主好文則鳯凰居之國亂其主好武則鳯凰去之今鳯凰翔於東郊而樂之其鳴音中夷則與天相副以是觀之天有嚴教以賜帝帝勿犯也召史卜之龜燋史曰臣不能占也其問之聖人帝曰已問天老力牧容成矣史北面再拜曰龜不違聖智故燋霧既降游于洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流於海得圖書焉龍圖出河龜書出洛赤文篆字以授軒轅接萬神於明庭今塞門谷口是也五十九年貫胷氏来賔長股氏来賓七十七年昌意降居若水産帝乾荒一百年地裂帝陟帝王之崩皆曰陟書稱新陟王謂新崩也帝以土徳王應地裂而陟葬羣臣有左徹者感思帝徳取衣冠几杖而朝饗之諸侯大夫嵗時朝焉約按帝摯少昊氏母曰女節見星如虹下流華渚既而夢接意感生少昊登帝位有鳯凰之瑞或曰名清不居帝位帥鳥師居西方以鳥紀官帝顓頊髙陽氏母曰女樞見瑤光之星貫月如虹感己於幽房之宫生顓頊於若水首戴干戈有聖徳生十年而佐少昊氏二十而登帝位元年帝即位居濮十三年初作厯象二十一年作承雲之樂三十年帝産伯鯀居天穆之陽七十八年帝陟術器作亂辛侯滅之帝嚳髙辛氏生而駢齒有聖徳初封辛侯代髙陽氏王天下使鼔人拊鞞鼓擊鐘磬鳯皇鼓翼而舞元年帝即位居亳十六年帝使重帥師滅有鄶四十五年帝錫唐侯命六十三年帝陟帝子摰立九年而廢帝堯陶唐氏母曰慶都生於斗維之野常有黄雲覆其上及長觀于三河常有龍隨之一旦龍負圖而至其文要曰亦受天祐眉八彩鬚髪長七尺二寸面銳上豐下足履翼宿既而隂風四合赤龍感之孕十四月而生堯於丹陵其狀如圖及長身長十尺有聖徳封於唐夢攀天而上髙辛氏衰天下歸之元年丙子帝即位居冀命羲和厯象五年初巡狩四岳七年有麟十二年初治兵十六年渠搜氏来賓十九年命共工治河二十九年春僬僥氏来朝貢沒羽四十二年景星見于翼五十年帝㳺于首山乗素車𤣥駒五十三年帝祭于洛五十八年帝使后稷放帝子朱於丹水六十一年命崇伯鯀治河六十九年黜崇伯鯀七十年春正月帝使四岳錫虞舜命帝在位七十年景星出翼鳯皇在庭朱草生嘉禾秀甘露潤醴泉出日月如合璧五星如聨珠厨中自生肉其薄如箑搖動則風生食物寒而不臭名曰箑脯又有草莢階而生月朔始生一莢月半而生十五莢十六日以後日落一莢及晦而盡月小則一莢焦而不落名曰蓂莢一曰厯莢洪水既平歸功於舜將以天下禪之乃潔齊修壇場於河洛擇良日率舜等升首山遵河渚有五老㳺焉蓋五星之精也相謂曰河圖將来告帝以期知我者重瞳黄姚五老因飛為流星上入昴二月辛丑昧明禮備至於日昃榮光出河休氣四塞白雲起回風搖乃有龍馬銜甲赤文緑色縁壇而上吐甲圖而去甲似龜背廣九尺其圖以白玉為檢赤土為泥似黄金約以青繩檢文曰闓色授帝舜言虞夏當授天命帝乃寫其言藏於東序後二年二月仲辛率羣臣沈璧於洛禮畢退俟至于下昃赤光起元龜負書而出背甲赤文成字止壇其書言當禪舜遂讓舜七十一年帝命二女嬪于舜七十三年春正月舜受終于文祖七十四年虞舜初巡狩四岳七十五年司空禹治河七十六年司空伐曹魏之戎克之, SBCK: ''}
