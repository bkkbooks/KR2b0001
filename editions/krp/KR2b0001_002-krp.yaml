body:
  text: 竹書紀年卷下梁沈約注周武王名𤼵初髙辛氏之世妃曰姜嫄助祭郊禖見大人迹履之當時歆如有人道感己遂有身而生男以為不祥棄之隘巷羊牛避而不踐又送之山林之中會伐林者又取而置寒氷上大鳥以一翼藉覆之姜嫄以為異乃收養焉名之曰棄枝頥有異相長為堯稷官有功於民后稷之孫曰公劉有徳諸侯皆以天子之禮待之初黄帝之世䜟言曰西北為王期在甲子昌制命𤼵行誅旦行道及公劉之後十三世而生季歴季歴之十年飛龍盈於殷之牧野此蓋聖人在下位將起之符也季歴之妃曰大任夢長人感己溲于豕牢而生昌是為周文王龍顔虎肩身長十尺胷有四乳太王曰吾世當有興者其在昌乎季歴之兄曰太伯知天命在昌適越終身不反弟仲雝從之故季歴為嗣以及昌昌為西伯作邑於豐文王之妃曰太姒夢商庭生棘太子𤼵植梓樹於闕間化為松栢棫柞以告文王文王幣率羣臣與𤼵竝拜告夢季秋之甲子赤爵銜書及豐置于昌户昌拜稽首受其文要曰姬昌蒼帝子亡殷者紂王將畋史編卜之曰將大獲非熊非羆天遣大師以佐昌臣太祖史疇為禹卜畋得臯陶其兆類此至于磻溪之水吕尚釣於涯王下趨拜曰望公七年乃今見光景于斯尚立變名答曰望釣得玉璜其文要曰姬受命昌来提撰爾洛鈐報在齊尚出游見赤人自洛出授尚書命曰召佐昌者子文王夢日月著其身又鷟鸑鳴於岐山孟春六句五緯聚房後有鳯凰銜書㳺文王之都書又曰殷帝無道虐亂天下星命已移不得復久靈祗逺離百神吹去五星聚房昭理四海文王既沒太子𤼵代立是為武王武王駢齒望羊將伐紂至于孟津八百諸侯不期而會咸曰紂可伐矣武王不從及紂殺比干囚箕子微子去之乃伐紂度孟津中流白魚躍入王舟王俯取魚長三尺目下有赤文成字言紂可伐王寫以世字魚文消燔魚以告天有火自天止於王屋流為赤烏烏銜榖焉榖者紀后稷之徳火者燔魚以告天天火流下應以告也遂東伐紂勝於牧野兵不血刃而天下歸之乃封吕尚於齊周徳既隆草木茂盛蒿堪為宫室因名蒿室既有天下遂都于鎬十二年辛夘王率西夷諸侯伐殷敗之于坶野王親禽受于南單之臺遂分天之明立受子禄父是為武庚夏四月王歸于豐饗于太廟命監殷遂狩於管作大武樂十三年巢伯来賓薦殷于太廟遂大封諸侯秋大有年十四年王有疾周文公禱于壇墠作金縢十五年肅慎氏来賓初狩方岳誥于沬邑冬遷九鼎于洛十六年箕子来朝秋王師滅蒲姑十七年命王世子誦于東宫冬十有二月王陟年九十四成王名誦元年丁酉春正月王即位命冡宰周文公總百官庚午周公誥諸侯于皇門夏六月葬武王于畢秋王加元服武庚以殷叛周文公出居于東二年奄人徐人及淮夷入于邶以叛秋大雷電以風王逆周文公于郊遂伐殷三年王師滅殷殺武庚禄父遷殷民于衛遂伐奄滅蒲姑姑與四國作亂故周文公伐之四年春正月初朝于廟夏四月初甞麥王師伐淮夷遂入奄五年春正月王在奄遷其君于蒲姑夏五月王至自奄遷殷民于洛邑遂營成周六年大蒐于岐陽七年周公復政于王春二月王如豐三月召康公如洛度邑甲子周文公誥多士于成周遂城東都王如東都諸侯来朝冬王歸自東都立髙圉廟八年春正月王初蒞阼親政命魯侯禽父齊侯伋遷庶殷于魯作象舞冬十月王師滅唐遷其民于杜九年春正月有事于太廟初用勺肅慎氏来朝王使榮伯錫肅慎氏命十年王命唐慎虞為侯越裳氏来朝周文公出居于豐十一年春正月王如豐唐叔獻嘉禾王命唐叔歸禾于周文公王命周平公治東都約按周平公即君陳周公之子伯禽之弟十二年王師燕師城韓王錫韓侯命十三年王師會齊侯魯侯伐戎夏六月魯大禘于周公廟十四年秦師圍曲城克之冬洛邑告成十八年春正月王如洛邑定鼎鳯凰見遂有事于河武王沒成王少周公旦攝政七年制禮作樂神鳥鳯凰見蓂荚生乃與成王觀于河洛沈璧禮畢王退俟至于日昃榮光竝出幕河青雲浮至青龍臨壇銜𤣥甲之圖坐之而去禮于洛亦如之𤣥龜青龍蒼光止于壇背甲刻書赤文成字周公援筆以世文寫之書成文銷龜隨甲而去其言自周公訖于秦漢盛衰之符麒麟遊苑鳯凰翔庭成王援琴而歌曰鳯凰翺兮於紫庭余何徳兮以感靈賴先王兮恩澤臻于胥樂兮民以寧十九年王巡狩侯甸方岳召康公從歸于宗周遂正百官黜豐侯二十一年除治象周文公薨于豐二十二年葬周文公于畢二十四年於越来賓二十五年王大會諸侯于東都四夷来賔冬十月歸自東都大事于太廟三十年離戎来賓約按離戎驪山之戎也為林氏所伐告于成王三十三年王遊于卷阿召康公從歸于宗周命王世子釗如房逆女房伯祈歸于宗周三十四年雨金于咸陽約按咸陽天雨金三年國有大喪三十七年夏四月乙丑王陟康王名釗元年甲戌春正月王即位命冡宰召康公總百官諸侯朝于豐宫三年定樂歌吉禘于先王申戒農官告于廟六年齊太公薨九年唐遷于晉作宫而美王使人讓之十二年夏六月壬申王如豐錫畢公命秋毛懿公薨十六年錫齊侯伋命王南巡狩至九江廬山十九年魯侯禽父薨二十一年魯築茅闕門二十四年召康公薨二十六年秋九月己未王陟昭王名瑕元年庚子春正月王即位復設象魏六年王錫郇伯命冬十二月桃李華十四年夏四月恒星不見秋七月魯人弑其君宰十六年伐楚涉漢遇大兕十九年春有星孛于紫㣲祭公辛伯從王伐楚天大曀雉兔皆震喪六師于漢王陟穆王名滿元年己未春正月王即位作昭宫命辛伯餘靡冬十月築祗宫于南鄭自武王至穆王享國百年穆王以下都于西鄭六年春徐子誕来朝錫命為伯八年春北唐来賓獻一驪馬是騄耳九年築春宫王所居有鄭宫春宫十一年王命卿士祭公謀父十二年毛公班共公利逢公固帥師從王伐犬戎冬十月王北巡狩遂征犬戎十三年春祭公帥師從王西征次于陽紆秋七月西戎来賓徐戎侵洛冬十月造父御王入于宗周十四年王帥楚子伐徐戎克之夏四月王畋于軍丘五月作范宫秋九月翟人侵畢冬蒐于萍澤作虎牢十五年春正月留昆氏来賓作重璧臺冬王觀于鹽澤一作王幸安邑觀鹽池非是十六年霍侯舊薨王命造父封于趙十七年王西征昆侖丘見西王母其年西王母来朝賓于昭宫秋八月遷戎于太原王北征行流沙千里積羽千里征犬戎取其五王以東西征于青鳥所解三危山西征還履天下億有九萬里十八年春正月王居祗宫諸侯来朝二十一年祭文公薨二十四年王命左史戎夫作記三十五年荆人入徐毛伯遷帥師敗荆人于泲三十七年大起九師東至于九江架黿鼉以為梁遂伐越至于紆荆人来貢三十九年王會諸侯于塗山四十五年魯侯㵒薨五十一年作吕刑命甫侯于豐五十五年王陟于祗宫共王名繄元年甲寅春正月王即位四年王師滅宻九年春正月丁亥王使内史良錫毛伯遷命十二年王陟懿王名堅元年丙寅春正月王即位天再旦于鄭七年西戎侵鎬十三年翟人侵岐十五年王自宗周遷于槐里十七年魯厲公擢薨二十一年虢公帥師北伐犬戎敗逋二十五年王陟懿王之世興居無節號令不時挈壺氏不能共其職諸侯於是攜徳孝王名辟方元年辛卯春正月王即位命申侯伐西戎五年西戎来獻馬七年冬大雨電江漢水牛馬死是年厲王生八年初牧于汧渭九年王陟夷王名燮元年庚子春正月王即位二年蜀人吕人来獻瓊玉賓于河用介珪三年王致諸侯烹齊哀公于鼎六年王獵于社林獲犀牛一以歸七年虢公帥師伐太原之戎至于俞泉獲馬千匹冬雨雹大如礪楚子熊渠伐庸至于鄂八年王有疾諸侯祈于山川王陟厲王名胡居彘有汾水焉故又曰汾王元年戊申春正月王即位作夷宫命卿士榮夷公落楚人来獻龜貝三年淮夷侵洛王命虢公長父殺之不克齊獻公山薨六年楚子延卒八年初監謗芮伯良夫戒百官于朝十一年西戎入于犬丘十二年玉亡奔彘國人圍王宫執召穆公之子殺之十三年王在彘共伯和攝行天子事號曰共和十四年玁狁侵宗周西鄙召穆公帥師追荆蠻至于洛十六年蔡武侯薨楚子勇卒十九年曹夷伯薨二十二年大旱陳幽公薨二十三年大旱宋僖公薨二十四年大旱杞武公薨二十五年大旱楚子嚴卒二十六年大旱王陟于彘周定公召穆公立太子靖為王共伯和歸其國遂大雨大旱既久廬舎俱焚會汾王崩卜于太陽兆曰厲王為祟周公召公乃立太子靖共和遂歸國和有至徳尊之不喜廢之不怒逍遙得志于共山之首宣王名靖元年甲戌春正月王即位周定公召穆公輔政復田賦作戎車燕恵侯薨二年錫大師皇父司馬休父命魯慎公薨曹公子蘇弑其君幽伯疆三年王命大夫仲伐西戎齊武公夀薨四年王命蹶父如韓韓侯来朝五年夏六月尹吉甫帥師伐玁狁至于太原秋八月方叔帥師伐荆蠻六年召穆公帥師伐淮夷王帥師伐徐戎皇父休父從王伐徐戎次于淮王歸自伐徐錫召穆公命西戎殺秦仲楚子霜卒七年王錫申伯命王命樊侯仲山甫城齊八年初考室魯武公来朝錫魯世子戯命九年王㑹諸侯于東都遂守于甫十二年魯武公薨齊人弑其君厲公無忌立公子赤十五年衛釐侯薨王錫虢文公命十六年晉遷于絳十八年蔡夷侯薨二十一年魯公子伯御弑其君懿公戯二十二年王錫王子多父命居洛二十四年齊文公赤薨二十五年大旱王禱于郊廟遂雨二十七年宋恵公覸薨二十八年楚子狥卒二十九年初不藉千畆三十年有兔舞於鎬京三十二年王師伐魯殺伯御命孝公稱于夷宫陳僖公孝薨有馬化為人三十三年齊成公薨王師伐太原之戎不克三十七年有馬化為狐燕僖侯卒楚子鄂卒三十八年王師及晉穆侯伐條戎奔戎王師敗逋三十九年王師伐姜戎戰于千畆王師敗逋四十年料民于太原戎人滅姜邑晉人敗北戎于汾隰四十一年王師敗于申四十三年王殺大夫杜伯其子隰叔出奔晉晉穆侯費生薨弟殤叔自立世子仇出奔四十四年晉殤叔元年丁巳四十六年王陟幽王名涅元年庚申春正月王即位晉世子仇歸于晉殺殤叔晉人立仇是為文侯王錫太師尹氏皇父命二年辛酉晉文侯元年涇渭洛竭岐山崩初増賦晉文侯同王子多父伐鄫克之乃居鄭父之丘是為鄭桓公三年王嬖褒姒冬大震電四年秦人伐西戎夏六月隕霜陳夷公薨五年王世子宜臼出奔申皇父作都于向六年王命伯士帥師伐六濟之戎王師敗逋西戎滅蓋冬十月辛卯朔日有食之七年虢人滅焦八年王錫司徒鄭伯多父命王立褒姒之子曰伯服為太子九年申侯聘西戎及鄫十年春王及諸侯盟于太室秋九月桃杏實王師伐申十一年春正月日暈申人鄫人及犬戎入宗周弑王及鄭桓公犬戎殺王子伯服執褒姒以歸申侯魯侯許男鄭子立宜臼于申虢公翰立王子余臣于攜是為攜王二王竝立武王滅殷嵗在庚寅二十四年嵗在甲寅定鼎洛邑至幽王二百五十七年共二百八十一年自武王元年己卯至幽王庚午二百九十二年平王名宜臼自東遷以後始紀晉事王即位皆不書元年辛未王東徙洛邑錫文侯命晉侯會衛侯鄭伯秦伯以師從王入于成周二年秦作西畤魯孝公薨賜秦晉以邠岐之田三年齊人滅祝王錫司徒鄭伯命四年燕傾侯卒鄭人滅虢五年秦襄公帥師伐戎卒于師宋戴公薨六年燕哀侯卒鄭遷於溱洧七年楚子儀卒八年鄭殺其大夫闗其思十年秦還于汧渭十三年魏武公薨十四年晉人滅韓十八年秦文公大敗戎師于岐来歸岐東之田二十一年晉文侯殺王子余臣于攜二十三年宋武公卒二十四年秦作陳寳祠二十五年晉文侯薨秦初用族刑二十六年丙申晉昭侯元年晉封其弟成師于曲沃三十二年晉潘父弑其君昭侯納成師不克立昭侯之子孝侯晉人殺潘父三十三年癸卯晉孝侯元年楚人侵申三十六年衛莊公卒王人戊申四十年齊莊公卒晉曲沃桓叔成師卒子鱓立是為莊伯自是晉侯在翼稱翼侯四十一年辛亥莊伯元年春大雨雪四十二年狄人伐翼至于晉郊宋襄公薨魯恵公使宰讓請郊廟之禮王使史角如魯諭止之四十七年晉曲沃莊伯入翼弑孝侯晉人逐之立孝侯子卻是為鄂侯四十八年戊午晉鄂侯卻元年無雲而雷魯恵公卒四十九年己未魯隠公元年春秋始此魯隠公及邾莊公盟于姑蔑五十一年春二月乙巳日有食之三月庚戌王陟桓王名林元年壬戌十月莊伯以曲沃叛伐翼公子萬救翼荀叔軫追之至于家谷翼侯焚曲沃之禾而還翼侯伐曲沃大捷武公請成于翼至相而還相一作桐二年王使虢公伐晉之曲沃晉鄂侯卒曲沃莊伯復攻晉立鄂侯子光是為哀侯公子萬救翼荀叔軫追之至于家谷三年甲子晉哀侯光元年四年曲沃莊伯卒子稱立是為武公尚一軍五年曲沃武公元年芮人乗京荀人董伯皆叛曲沃十一年晉小子侯元年曲沃獲晉哀侯晉人立哀侯子為小子侯芮伯萬出奔魏萬之母逐萬十二年王師秦師圍魏取芮伯萬而東之十三年冬曲沃伯誘晉小子侯殺之晉曲沃滅荀以與地賜大夫原氏黯是為荀叔戎人逆芮伯萬于郊十四年王命虢仲伐曲沃立晉哀侯弟緡于翼為晉侯十五年晉侯緡元年十六年春滅翼十九年鄭莊公卒二十三年三月乙未王陟莊王名佗元年乙酉曲沃尚一軍異于晉六年五月葬桓王十五年王陟釐王名胡齊元年庚子春齊桓公會諸侯于北杏以平宋亂三年曲沃武公滅晉侯緡以寳獻王王命武公以一軍為晉侯四年晉武公二十八年晉猶不與齊桓公之盟左𫝊注晉侯緡是年滅恵王名閬元年乙巳晉獻公元年晉獻公朝王如成周周陽白兔舞于市二年王子頽亂王居于鄭鄭人入王府多取玉玉化為蜮射人九年晉城絳十六年晉獻公作二軍滅耿以賜大夫趙夙滅魏以賜大夫畢萬晉滅於大夫趙韓魏萌於此十七年衛懿公及赤狄戰于洞澤洞當作泂十九年晉獻公會虞師伐虢滅下陽虢公醜奔衛公命瑕父吕甥邑于國都二十五年春正月狄人伐晉王陟襄王名鄭元年庚午晉獻公卒立奚齊里克殺之及卓子立夷吾二年辛未晉恵公元年晉殺里克三年雨金于晉七年秦伯涉河伐晉十五年晉恵公卒子懐公圉立秦穆公帥師送公子重耳圍令狐桑泉臼衰皆降為秦師狐尾與先軫禦秦至于廬栁乃謂秦穆公使公子縶来與師言次子郇盟于軍公子重耳涉自河曲十六年乙酉晉文公元年晉殺子圉十七年晉城荀二十年周襄王會諸侯于河陽二十三年齊師逐鄭太子齒奔城張南鄭二十四年晉文公卒二十五年甲午晉襄公驩元年三十年洛絶于􅀈三十一年晉襄公卒三十二年辛丑晉靈公夷臯元年三十三年王陟頃王名壬臣元年癸卯六年彗星入北斗王陟匡王名班元年己酉六年王陟晉靈公為趙穿所殺趙盾使穿迎公子黒臋于周立之定王名瑜元年乙卯晉成公元年六年晉成公與狄伐秦獲秦諜殺之絳市六日而蘇七年晉成公卒于扈八年壬戌晉景公元年十八年齊國佐来獻玉磬紀公之甗二十一年王陟簡王名夷元年丙子五年晉景公卒六年辛巳晉厲公元年十二年晉厲公卒楚共王㑹宋平公于湖陽十四年己丑晉悼公元年王陟靈王名泄心元年庚寅十四年晉悼公卒十五年甲辰晉平公元年二十七年王陟景王名貴元年丁巳十三年春有星出婺女十月晉平公卒十四年庚午晉昭公元年河水赤于龍門三里十九年晉昭公卒冬十二月桃杏花二十年晉頃公元年二十五年晉頃公平王室亂立敬王敬王名丐元年壬午八年晉頃公卒九年庚寅晉定公元年十四年漢不見于天二十六年晉青虹見二十八年洛絶于周三十六年淇絶于舊衛三十九年晉城頓丘四十三年宋殺其大夫皇瑗于丹水之上丹水壅不流四十四年王陟元王名仁元年丙寅晉定公卒二年晉出公元年四年於越滅吳六年晉澮絶于梁丹水三日絶不流七年齊人鄭人伐衛王陟貞定王名介元年癸酉於越徙都瑯琊四年十一月於越子句踐卒是為菼執次鹿郢立六年晉河絶于扈七年晉荀瑤城南梁一本晉出公二十年十年於越子鹿郢卒不夀立十一年晉出公出奔齊十二年河水赤三日荀瑤伐中山取窮魚之丘十三年晉韓龎取秦武城十六年晉出公二十二年十七年晉出公薨乃立昭公之孫是為敬公十八年己丑晉敬公元年二十年於越子不夀見殺是為盲姑次朱勾立二十二年楚滅蔡二十四年楚滅杞二十八年晉敬公十一年王陟考王名嵬元年敬公十二年魏文侯立十年楚滅莒十一年晉敬公卒十二年晉幽公栁元年魯悼公卒十四年魯季孫會晉幽公于楚丘十五年王陟威烈王名午元年丙辰三年晉大旱地生鹽五年晉丹水出反潔六年晉大夫秦嬴賊幽公于髙寝之上魏文侯立幽公子止七年壬戌晉烈公元年趙獻子城泫氏韓武子都平陽八年趙城平邑九年楚人伐我南鄙至于上洛十一年田公子居思伐邯鄲圍平邑於越滅滕十二年於越子朱勾伐郯以郯子鴣歸十四年於越子朱勾卒子翳立十六年齊田盻及邯鄲韓舉戰于平邑邯鄲之師敗逋遂獲韓舉平邑新城十七年魏文侯伐秦至鄭還築汾隂郃陽田悼子卒田布殺其大夫公孫孫公孫孫以廪丘叛于趙田布圍廪丘翟角趙孔屑韓氏救廪丘及田布戰于龍澤田師敗逋十八年王命韓景子趙烈子反我師伐齊入長垣二十三年王命晉卿魏氏趙氏韓氏為諸侯二十四年王陟安王名驕元年庚辰九年晉烈公卒子桓公立韓非子作桓侯十年己丑晉桓公頃元年十五年魏文侯卒在位五十年大風晝昏晉太子喜出奔十六年乙未魏武侯擊元年封公子緩二十一年韓滅鄭哀侯入于鄭二十三年於越遷于吳二十六年王陟魏城洛陽及安邑王垣七月於越太子諸咎弑其君翳十月越人殺諸咎越滑吳人立孚錯枝為君烈王名喜元年丙午魏公子緩如邯鄲以作難邯鄲趙地名於越大夫寺區定越亂立初無余是為莽安二年秦胡蘇帥師伐韓韓將韓襄敗胡蘇于酸水魏觴諸侯于范臺晉桓公邑哀侯于鄭韓山堅賊其君哀侯六年辛亥梁恵成王元年韓共侯趙成侯遷晉桓公于屯留以後更無晉事趙成侯偃韓懿侯若伐我葵鄈城七年王陟我師伐趙圍蜀陽齊田夀帥師伐我圍觀觀降魏大夫王錯出奔韓顯王名扁元年癸丑鄭城邢丘自此韓改稱曰鄭秦子向命為藍君二年河水赤于龍門三日三年公子景賈帥師伐鄭韓明戰于韓我師敗逋四年夏四月甲寅徙邦于大梁王𤼵逢忌之藪以賜民於越寺區弟思弑其君莽安次無顓立五年雨碧于郢地忽長十丈有餘髙尺半六年我師伐邯鄲取列人我師伐邯鄲取肥雨黍于齊七年我與邯鄲趙榆次陽邑王會鄭釐侯于巫沙八年入河水于圃田又為大溝而引圃水瑕陽人自秦導岷山青衣水来歸九年秦師伐鄭次于懐城殷十年楚師出河水以水長垣之外龍賈帥師築長城于西邊鄭取屯留尚子十一年鄭釐侯使許息来致地平丘户牖首垣諸邑及鄭馳地我取枳道與鄭鹿王及鄭釐侯盟于巫沙以釋它陽之圍歸釐于鄭十二年魯恭侯宋桓侯衛成侯鄭釐侯来朝於越子無顓卒是為菼蠋卯次無疆立十三年邯鄲成侯會燕成侯于安邑十四年秦公孫壯伐鄭圍焦城不克秦公孫壯帥師城上枳安陵山民邯鄲伐衛取漆富兵城之齊師及燕戰于泃水齊師遁十五年齊田期伐我東鄙戰于桂陽我師敗逋東周與鄭髙都鄭釐侯来朝中陽宋景鼓衛公孫倉會師圍我襄陵十六年王以韓師諸侯帥縣于襄陵齊侯使楚景舎来求成邯鄲之師敗我師于桂陵秦伐韓閼與恵成王使趙缺破之不知是何年十七年燕伐趙圍濁鹿趙靈王及伐人救濁鹿敗燕師于勺晉取𤣥武濩澤即雷澤舜漁處十八年齊築房以為長城十九年王如衛命公子南為侯二十年二十一年魏殷臣趙公孫衰伐燕還取夏屋城曲逆二十二年壬寅孫何侵楚人三户乳楚伐徐州二十三年魏章帥師及鄭師伐楚取上蔡孫何取㶏陽秦孝公會諸侯于逢澤絳中地􅠂西絶于汾二十四年魏敗韓馬陵二十五年二十六年穰庇帥師及鄭孔夜戰于梁赫鄭師敗逋與齊田盻戰于馬陵二十七年五月齊田盻及宋人伐我東鄙圍平陽九月秦衛鞅伐我西鄙十月邯鄲伐我北鄙王攻衛鞅我師敗逋二十八年城濟陽秦封衛鞅于鄔改名曰尚二十九年邳遷于薛三月為大溝于北郛以行圃田之水三十年三十一年秦蘇胡帥師伐鄭韓襄敗秦蘇胡于酸水不知何年附此三十二年三十三年鄭威侯與邯鄲圍襄陵三十四年魏恵成王三十六年改元稱一年王與諸侯會于徐州於越子無疆伐楚三十五年楚吾得帥師及秦伐鄭圍綸氏不知何年附此三十六年楚圍齊於徐州遂伐於越殺無疆三十七年三十八年龍賈及秦師戰于雕隂我師敗逋王會鄭威侯于巫沙三十九年秦取我汾隂皮氏四十年四十一年秦歸我焦曲沃四十二年九鼎淪泗沒于淵四十三年四十四年四十五年楚敗我襄陵四十六年四十七年四十八年王陟慎靚王名定元年辛丑秦取我曲沃平周二年魏恵成王薨三年今王元年四年五年六年鄭侯使韓辰歸晉陽及向二月城陽向更名陽為河雍向為髙平隠王史記作赧王名延盖赧隠聲相近元年丁未十月鄭宣王来朝梁燕子之殺公子平不克齊師殺子之醢其身二年齊地景長長丈餘髙一尺魏以張儀為相三年韓明帥師伐襄丘秦王来見于蒲坂闗四月越王使公師隅来獻舟三百箭五百萬及犀角象齒五月張儀卒四年翟章伐衛魏敗趙將韓舉五年洛入成周山水大出六年十月大霖雨疾風河水酸棗楚庶章帥師来會我次于襄丘七年翟章救鄭次于南屈此年未的八年秦公孫爰帥師伐我皮氏翟章帥師救皮氏圍疾西風九年城皮氏十年十一年十二年秦收我蒲坂晉陽封谷十三年邯鄲命吏大夫奴遷于九原將軍大夫適子伐史皆貂服十四年十五年薛侯来會王于釜丘楚入雍氏楚人敗十六年王與齊王會于韓今王終二十年竹書紀年卷下
