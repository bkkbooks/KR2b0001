body:
  text: 朱右曾輯録汲冢紀年存真朱右曾輯録汲冢紀年存真五帝昌意降居若水産帝乾荒帝王之崩曰陟黃帝既仙去其臣有左徹者削木為黃帝之像帥諸侯朝奉之黃帝死七年其臣左徹乃立顓頊顓頊産伯鯀是維若陽居天穆之陽帝堯元年丙子堯有聖德封于唐夢攀天而上后稷放帝朱于丹水舜耕于歷夢眉長與髮等遂登庸命咎陶作刑三苗將亡天雨血夏有冰地坼及泉青龍生于廟日夜出晝日不出夏后氏禹禹都陽城黃帝至禹為三十世夏禹未遇夢乘舟月中過而後受虞室之禪禹立四十五年啓啓曰會益干啓位啓殺之九年舞九韶二十五年征西河二十九年陟年九十八太康太康居斟鄩乃失邦羿居斟鄩仲康相后相即位處商邱元年征淮夷畎夷二年征風夷及黃夷七年于夷來賓相居斟灌少康少康即位方夷來賓獻其樂舞帝杼帝杼居原自原遷于老邱柏杼子征于東海及三壽得一狐九尾后芬發后芬發即位二年九夷來御曰畎夷千夷方夷黃夷白夷赤夷元夷風夷陽夷洛伯用與河伯馮夷鬭后芬立四十四年后荒后荒即位元年以元圭賓于河命九東狩于海獲大魚后芒在位五十八年陟后泄王亥託于有易河伯僕牛殷王子亥賓于有易而淫焉有易之君綿臣殺而放之故殷上甲微假師于河伯以伐有易滅之遂殺其君綿臣后泄二十一年命畎夷白夷赤夷元夷風夷陽夷繇是服從陟不降不降即位六年伐九苑六十九年其弟立是為帝扃帝扃帝廑帝廑一名胤甲允甲允甲即位居西河允甲在位四十歲天有祅孽十日並照于東陽其年允甲陟本有十日迭次而出運照無窮孔甲后昊后昊立三年后發后發一名后敬或曰發惠后發即位元年諸夷賓于王門冉保墉會于上池諸夷入舞其子立為傑后桀居斟鄩畎夷入居豳岐之閒不窋之晜孫后桀命扁伐岷山岷山莊王女于桀二人曰琬曰琰桀愛一人女無子焉斫其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰末喜氏築傾宮飾瑤臺作瓊室立玉門末喜氏以與伊尹交遂以閒夏築傾宮飾瑤臺社坼裂湯遂滅夏桀逃南巢氏凡夏自禹以至于桀十七王有王與無王用歲四百七十一年商湯湯有七名而九征外丙外丙勝即位居亳仲壬仲壬即位居毫命卿士伊尹伊尹祠桐宮歌曰日月有常星辰有行四時從經萬姓允誠於豫論樂配天之靈遷于聖賢莫不咸聽鼚乎鼓之軒乎舞之精華以竭褰裳去之仲壬崩立大甲伊尹放大甲于桐乃自立大甲伊尹即位放大甲七年大甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之伊尹年百有五歲大甲十二年陟沃丁沃丁絢即位居亳小庚小庚辨即位居亳小甲小甲高即位居亳雍己雍己胄即位居亳大戊仲丁仲丁即位元年自亳遷于囂征于藍夷外壬外壬居囂河亶甲河亶甲整即位自囂遷于相征藍夷再征班方祖乙祖乙滕即位是為中宗居庇祖辛開甲帝開甲踰即位居庇祖丁祖丁即位居庇南庚南庚更自庇遷于奄陽甲陽甲即位居奄和甲西征得一丹山盤庚盤庚旬即位自奄遷于北蒙曰殷殷在鄴南三十里自盤庚徙殷至紂之滅二百七十三年更不徙都紂時稍大其邑南距朝歌北據邯鄲皆為離宮別館小辛小辛頌即位居殷小乙小乙斂居殷武丁祖庚祖庚曜居殷祖甲帝祖甲載居殷和甲西征得一丹山馮辛馮辛先居殷庚丁庚丁居殷武乙武乙即位居殷三十四年周王季歷來朝王賜地三十里玉十瑴馬八匹三十五年周王季歷伐西落鬼戎俘二十翟王太丁太丁二年周人伐燕京之戎周師大敗三年洹水一日三絶四年周人伐余無之戎克之周王季命為殷牧師七年周人伐始呼之戎克之十一年周人伐翳徒之戎捷其三大夫太丁文丁殺季歷帝乙帝乙居殷二年周人伐商帝辛帝辛受居殷周大曀六年周文王初禴于畢畢西于豐三十里殷紂作瓊室立玉門天大曀自成湯滅夏以至于受二十九王用歲四百九十六年周武王十一年庚寅周始伐殷王率西夷諸侯伐殷敗之于坶野王親禽帝受于南單之臺遂分天之明王陟年五十四成王康王康王六年齊大公望卒晉侯築宮而美康王使讓之成康之際天下安寧刑錯四十餘年不用昭王昭王十六年伐楚荊涉漢遇大兕昭王末年夜清五色光貫紫微其年王南巡不返十九年天大曀雉兔皆震喪六師于漢穆王穆王元年築祇宮于南鄭自周受命至穆王享國百年穆王以下都于西鄭北唐之君來見獻一驪馬是生騄耳穆王所居鄭宮春宮穆王北征行流沙千里積羽千里西征犬戎取其五王以東王遂遷戎于太原十三年西征至于青鳥之所憩十七年王西征昆侖邱見西王母西王母止之曰有鳥𧮹人西王母來見賓于昭宮穆王西征還里天下億有九萬里東征二億二千五百里南征億有七百三里北征二億七里留昆氏來賓三十七年大起九師伐紆東至于九江叱黿鼉以為梁共王懿王懿王元年天再旦于鄭孝王孝王七年厲王生冬大雨雹牛馬死江漢俱凍夷王夷王二年蜀人呂人來獻瓊玉賓于河用介圭三年王致諸侯烹齊哀公于鼎獵于桂林得一犀牛命虢公帥六師伐太原之戎至于俞泉獲馬千匹七年冬雨雹大如礪厲王淮夷入寇王命虢仲征之不克共伯和干王位共和十四年大旱火焚其屋伯和篡位立秋又大旱其年周厲王死立宣王宣王四年使秦仲伐西戎為戎所殺秦無曆數周世陪臣自秦仲之前本無年世之紀王召秦仲子莊公與兵七千人伐戎破之三十年有兔舞于鎬京三十一年王師伐太原之戎不克三十三年有馬化為狐三十六年王伐條戎奔戎王師敗績三十八年晉人敗北戎于汾隰戎人滅姜侯之邑三十九年王征申戎破之自武王滅殷以至幽王凡二百五十七年晉殤叔四年文侯元年周幽王命伯士帥師伐六濟之戎軍敗伯士死焉二年周厲王子多父伐鄶克之乃居鄭父之邱名之曰鄭是曰桓公七年幽王立褒姒之子曰伯服以為太子平王奔西申九年幽王十年九月桃杏實十年申侯魯侯及許文公立平王于申以本太子故稱天王伯盤與幽王俱死于戲虢公翰立王子余臣于攜周二王並立三十一年文侯殺王子余臣于攜三十五年昭侯元年七年孝侯元年六年曲沃莊伯晉莊伯元年不雨雪二年翟人俄伐翼至于晉郊八年無雲而雷十月莊伯以曲沃叛莊伯以曲沃叛伐翼公子萬救翼荀叔軫追之至于家谷十年十一年十二年正月魯隱公及邾莊公盟于姑蔑翼侯焚曲沃之禾而還十四年十六年十八年武公晉武公元年尚一軍芮人乘京荀人董伯皆叛翼侯伐曲沃大捷武公請成于翼至桐庭乃返六年七年芮伯萬之母芮姜逐萬萬出奔魏八年秋秦侵芮冬周師虢師圍魏取芮伯萬而東之九年戎人逆芮伯萬于郊武公滅荀以賜大夫原氏黯是為荀叔十一年十三年楚及巴伐鄧十九年二十三年齊襄公滅紀郱鄑郚三十四年三十七年三十八年三十九年齊人殲于遂獻公元年二年春王子頽亂周惠王居于鄭鄭人入王府多取玉焉玉化為蜮射人十七年鄭棄其師衛懿公及赤狄戰于洞澤十九年獻公會虞師伐虢滅下陽二十一年重耳出奔二十二年虢公醜奔衛獻公命瑕父呂甥邑于虢都二十五年正月狄人伐晉周陽有白兔舞于市二十六年惠公元年二年秦穆公取靈邱雨金六年秦穆公涉河伐晉惠公見獲十一月隕石于宋五十四年秦穆公帥師送公子重耳涉自河曲圍令狐桑泉臼衰皆降于秦師狐毛與先軫禦秦至于廬柳乃謂秦穆公使公子縶來與師言退舍次于郇盟于軍文公元年五年周襄王會諸侯于河陽文公城荀齊師逐鄭大子齒奔張城南鄭九年襄公元年晉襄公六年洛絶于泂七年靈公元年十四年成公元年七年景公元年十一年齊國佐來獻玉磬紀公之甗十九年厲公元年楚共王會宋平公于湖陽七年悼公元年十六年平公元年六年有五黑氣如日七年二十六年昭公晉昭公元年河水赤于龍門三里六年十二月桃杏花頃公元年十四年定公元年晉定公六年漢不見于天十八年青虹見淇絶于舊衛燕簡公卒次孝公立二十年洛絶于周二十五年西山女子化為丈夫與之妻能生子其年鄭一女生四十人二十死三十一年城頓邱三十三年三十五年宋殺其大夫皇瑗于丹水之上宋大水丹水壅不流三十七年出公元年晉出公五年澮絶于梁丹水三日絶不流六年齊鄭伐衛荀瑤城宅陽宅陽一名北宅十年十一月於越子句踐卒是為菼執次鹿郢立衛悼公卒于越十二年河絶于扈十三年智伯瑤城高梁十六年於越子鹿郢卒次不壽立荀瑤伐中山取窮魚之邱十九年晉韓龍取盧氏城二十年燕成侯載立二十二年魏桓子韓康子趙襄子共殺智伯并其地二十三年出公出奔楚乃立昭公之孫是為敬公敬公元年三年於越子不壽見殺是為盲姑次朱句立十一年田莊子卒十二年田悼子立燕成公卒燕文公立十八年魏文侯初立二十二年幽公元年幽公三年魯季孫會晉幽公于楚邱取葭密遂城之七年晉大旱地生鹽陰司馬敗燕公子翌于武垣九年丹水出相反擊十年九月桃杏實十二年無雲而雷十四年於越子朱句滅滕燕文公卒簡公立十五年於越子朱句滅郯以郯子鴣歸秦靈公卒十七年於越子朱句卒十八年晉夫人秦嬴賊公于高寢之上烈公晉烈公元年趙獻子城泫氏韓武子都平陽二年趙城平邑三年楚人伐我南鄙至于上洛五年田公子居思伐邯鄲圍平邑六年秦簡公卒次敬公立七年田悼子卒次田和立田布殺其大夫公孫孫公孫會以廩邱叛于趙田布圍廩邱翟角趙孔屑韓師救廩邱及田布戰于龍澤田師敗逋十二月齊宣公薨九年三晉命邑為諸侯十年齊田𦙝及邯鄲韓舉戰于平邑邯鄲之師敗逋獲韓舉取平邑新城十二年王命韓景子趙烈子翟員師伐齊入長城景子名虔田侯午生國大風晝昏自旦至中明年太子喜出奔十五年魏文侯卒魏武侯元年封公子緩三年秦敬公卒乃立惠公七年晉烈公卒次桓公立武侯十一年城洛陽及安邑王垣宋悼公卒十四年田侯剡立十七年於越子翳遷于吳二十年趙與中山公戰于訪子七月於越大子諸咎弒其君翳十月越殺諸咎越滑吳人立子錯枝為君二十一年於越大夫寺區定越亂立初無余之齊康公卒次幽公立二十二年韓滅鄭哀侯入于鄭齊田午弒其君及孺子喜而為公二十三年晉桓公邑哀侯于鄭韓山堅賊其君哀侯而韓若山立趙敬侯卒二十四年宋桓侯壁兵立二十五年二十六年武侯卒燕簡公卒梁惠成王元年韓共侯趙成侯遷晉桓公于屯留晝晦趙成侯偃韓懿侯若伐我葵惠成王伐趙圍濁陽鄴師敗邯鄲之師于平陽二年齊田壽帥師伐我圍觀觀降魏大夫王錯出奔韓三年鄭城邢邱秦子向命為藍君四年河水赤于龍門三日五年公子景賈帥師伐鄭韓明戰于陽我師敗逋六年四月甲寅徙都于大梁王發蓬忌之藪以賜民於越寺區弟思弒其君莽安次無顓立七年雨碧于郢地忽長十丈有餘高尺半公子緩如邯鄲以作難齊桓公弒其君母八年惠成王伐邯鄲取列人伐邯鄲取肥雨黍于齊雨骨于赤髀九年與邯鄲榆次陽邑晉取泫氏王會鄭釐侯于巫沙十年入河水于甫田又為大溝而引甫水瑕陽人自秦道岷山青衣水來歸十一年鄭釐侯使許息來致地平邱戶牖首垣諸邑及鄭馳道我取軹道與鄭鹿東周惠公傑薨秦師伐鄭次于懷城殷十二年龍賈帥師築長城于西邊楚師出河水以水長垣之外鄭取屯留尚子涅十三年王及鄭釐侯盟于巫沙以釋宅陽之圍歸釐于鄭齊桓公卒次威王立十四年魯恭侯宋桓侯衛成侯鄭釐侯來朝於越子無顓卒是為菼蠋卯十五年遣將龍賈築陽池以備秦鄭築長城自亥谷以南魯恭侯來朝邯鄲成侯會燕成侯于安邑十六年秦公孫壯帥師伐鄭圍焦城不克秦公孫壯帥師城上枳安陵山民邯鄲伐衛取漆富邱城之齊師及燕師戰于泃水齊師遁邯鄲四曀室多壞民多死十七年韓姬弒其君悼公東周與鄭高都利宋剔成肝廢其君壁而自立鄭釐侯來朝中陽齊田期伐我東鄙戰于桂陽我師敗逋宋景繕衛公孫倉會齊師圍我襄陵徐州子期十八年王以韓師敗諸侯師于襄陵齊侯使楚景舍來求成王會齊宋之圍敗韓于馬陵邯鄲之師敗我師于桂陵十九年晉取元武濩澤二十年齊築防以為長城衛將軍文子為子南彌牟後有子南徑朝于魏惠成王如衛命子南為侯魏殷臣趙公孫裒伐燕還取夏屋城曲逆壬寅孫何侵楚入三戶郛二十四年楚伐徐州魏章帥師及鄭師伐楚取上蔡孫何取㶏陽二十五年絳中地坼西絶于汾二十六年敗韓馬陵二十七年十二月齊田朌伐我二十八年與齊田朌戰于馬陵我師敗逋穰疵帥師及鄭孔夜戰于梁赫鄭師敗逋二十九年秦孝公會諸侯于蓬澤五月齊田朌及宋人伐我東鄙圍平陽九月秦衛鞅伐我西鄙十月邯鄲伐我北鄙王攻衛鞅我師敗績三十年城泲陽秦封衛鞅于塢改名曰商三十一年三月為大溝于北郛以行圃田之水邳遷于薛改名徐州三十二年與秦戰岸門秦蘇胡帥師伐鄭韓襄敗秦蘇胡于酸水三十六年一年二年鄭昭侯武薨次威侯立三年齊師伐趙東鄙圍中牟九年鄭威侯與邯鄲圍襄陵五月梁惠王會威侯于巫沙十月鄭宣王朝梁十年齊田朌及邯鄲韓舉戰于平邑邯鄲之師敗逋獲韓舉取平邑新城十一年王會韓昭侯齊宣王于平阿衛平侯卒子孝襄侯立十三年王會齊威王于鄄四月齊威王封田嬰于薛十月齊城薛十四年薛子嬰來朝嬰初封彭城十五年齊威王薨燕人伐趙圍濁鹿趙武靈王及代人救濁鹿敗燕師于勺梁十六年惠成王薨今王元年四年鄭侯使韓辰歸晉陽及向二月城陽向更名陽為河雍向為高平碧陽君之諸御産二龍五年燕子之殺公子平齊人擒子之醢其身趙召燕公子職于韓立以為燕王使樂池送之六年秦取我焦齊地暴長長七丈餘高一尺七年韓明帥師伐襄邱秦王來見于蒲阪關四月越王使公師隅來獻乘舟始罔及舟三百箭五百萬犀角象齒齊宣王殺其王后楚景翠圍韓雍氏秦助韓共敗楚屈丐韓宣王卒齊宋圍煮棗八年翟章伐衛秦楮里疾圍蒲不克而秦惠王薨九年洛入成周山水大出五月張儀卒楚庶章帥師來會我次于襄邱十年十月大霖雨疾風河水溢酸棗郛十二年秦公孫爰帥師伐我圍皮氏翟章帥師救皮氏圍疾西風十三年城皮氏十四年秦內亂殺其太后及公子雍公子壯十五年楚吾得帥師及秦伐鄭圍綸氏翟章救鄭次于南屈十六年秦拔我蒲阪晉陽封谷十七年邯鄲命吏大夫奴遷于九原又命將軍大夫適子戍吏皆貉服救中山塞集胥口十九年薛侯來會王于釜邱楚入雍氏楚人敗二十年
