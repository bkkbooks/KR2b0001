body:
  text: 四部叢刊本所收今本竹書紀年四部叢刊本所收今本竹書紀年黃帝軒轅氏元年帝即位居有熊初制冕服二十年景雲見以雲紀官五十年秋七月庚申鳳鳥至帝祭于洛水五十九年貫胸氏來賓長股氏來賓七十七年昌意降居若水産帝乾荒一百年地裂帝陟帝摯少昊氏帝顓頊高陽氏元年帝即位居濮十三年初作曆象二十一年作承雲之樂三十年帝産伯鯀居天穆之陽七十八年帝陟術器作亂辛侯滅之帝嚳高辛氏元年帝即位居亳十六年帝使重帥師滅有鄶四十五年帝錫唐侯命六十三年帝陟帝堯陶唐氏元年丙子帝即位居冀命羲和曆象五年初巡狩四嶽七年有麟十二年初治兵十六年渠搜氏來賓十九年命共工治河二十九年春僬僥氏來朝貢沒羽四十二年景星見于翼五十年帝遊于首山乘素車玄駒五十三年帝祭于洛五十八年帝使后稷放帝子朱于丹水六十一年命崇伯鯀治河六十九年黜崇伯鯀七十年春正月帝使四嶽錫虞舜命七十一年帝命二女嬪于舜七十三年春正月舜受終于文祖七十四年虞舜初巡狩四嶽七十五年司空禹治河七十六年司空伐曹魏之戎克之八十六年司空入覲贄用玄圭八十七年初建十有二州八十九年作游宮于陶九十年帝游居于陶九十七年司空巡十有二州一百年帝陟于陶帝舜有虞氏元年己未帝即位居冀作大韶之樂三年命咎陶作刑九年西王母來朝十四年卿雲見命禹代虞事十五年帝命夏后有事于太室十七年春二月入學初用萬二十五年息慎氏來朝貢弓矢二十九年帝命子義鈞封于商三十年葬后育于渭三十二年帝命夏后總師遂陟方嶽三十三年春正月夏后受命于神宗遂復九州三十五年帝命夏后征有苗有苗氏來朝四十二年玄都氏來朝貢寶玉四十七年冬隕霜不殺草木四十九年帝居于鳴條五十年帝陟帝禹夏后氏元年壬子帝即位居冀頒夏時于邦國二年咎陶薨五年巡狩會諸侯于塗山八年春會諸侯于會稽殺防風氏夏六月雨金于夏邑秋八月帝陟于會稽禹立四十五年帝啓元年癸亥帝即位于夏邑大饗諸侯于鈞臺諸侯從帝歸于冀都大饗諸侯于璿臺二年費侯伯益出就國王帥師伐有扈大戰于甘六年伯益薨祠之八年帝使孟涂如巴涖訟十年帝巡狩舞九韶于大穆之野十一年放王季子武觀于西河十五年武觀以西河叛彭伯壽帥師征西河武觀來歸十六年陟帝太康元年癸未帝即位居斟鄩畋于洛表羿入居斟鄩四年陟帝仲康元年己丑帝即位居斟鄩五年秋九月庚戌朔日有食之命胤侯帥師征羲和六年錫昆吾命作伯七年陟世子相出居商丘依邳侯帝相元年戊戌帝即位居商征淮夷二年征風及黃夷七年于夷來賓八年寒浞殺羿使其子澆居過九年相居于斟灌十五年商侯相土作乘馬遂遷于商丘二十年寒浞滅戈二十六年寒浞使其子澆帥師滅斟灌二十七年澆伐斟鄩大戰于濰覆其舟滅之二十八年寒浞使其子澆弒帝后緡歸于有仍伯靡出奔鬲夏世子少康生少康自有仍奔虞伯靡自鬲帥斟鄩斟灌之師以伐浞世子少康使汝艾伐過殺澆伯子杼帥師滅戈伯靡殺寒浞少康自綸歸于夏邑帝少康元年丙午帝即位諸侯來朝賓虞公二年方夷來賓三年復田稷十一年使商侯冥治河十八年遷于原二十一年陟帝杼元年己巳帝即位居原五年自原遷于老丘八年征于東海及三壽得一狐九尾十三年商侯冥死于河十七年陟帝芬元年戊子帝即位三年九夷來御十六年洛伯用與河伯馮夷鬭三十三年封昆吾氏子于有蘇三十六年作圜土四十四年陟帝芒元帝壬申帝即位以玄圭賓于河十三年東狩于海獲大魚三十三年商侯遷于殷五十八年陟帝泄帝元年辛未帝即位十二年殷侯子亥賓于有易有易殺而放之十六年殷侯微以河伯之師伐有易殺其君綿臣二十一年命畎夷白夷玄夷風夷黃夷二十五年陟帝不降元年己亥帝即位六年伐九苑三十五年殷滅皮氏五十九年遜位于弟扃帝扃元年戊戌帝即位十年帝不降陟十八年陟帝廑元年己未帝即位居西河四年作西音昆吾氏遷于許八年天有祅孽十日竝出其年陟帝孔甲元年乙巳帝即位居西河廢豕韋氏使劉纍豢龍三年王畋于萯山五年作東音七年劉纍遷于魯陽九年陟殷侯復歸于商丘帝昊元年庚辰帝即位使豕韋氏復國三年陟帝發元年乙酉帝即位諸夷賓于王門再保墉會于上池諸夷入舞七年陟泰山震帝癸元年壬辰帝即位居斟鄩三年築傾宮毀容臺畎夷入于岐以叛六年岐踵戎來賓十年五星錯行夜中星隕如雨地震伊洛竭十一年會諸侯于仍有緡氏逃歸遂滅有緡十三年遷于河南初作輦十四年扁帥師伐岷山十五年商侯履遷于亳十七年商使伊尹來朝二十年伊尹歸于商及汝鳩汝方會于北門二十一年商帥征有洛克之遂征荊荊降二十二年商侯履來朝命囚履于夏臺二十三年釋商侯履諸侯遂賓于商二十六年商滅溫二十八年昆吾氏伐商商會諸侯于景亳遂征韋商師取韋遂征顧太史令終古出奔商二十九年商師取顧三日竝出費伯昌出奔商冬十月鑿山穿陵以通于河三十年瞿山崩殺其大夫關龍逄商師征昆吾冬聆隧災三十一年商自陑征夏邑克昆吾大雷雨戰于鳴條夏師敗績桀出奔三朡商師征三朡戰于獲桀于焦門放之于南巢殷商成湯十八年癸亥王即位居亳始屋夏社十九年大旱氐羌來賓二十年大旱夏桀卒于亭山禁弦歌舞二十一年大旱鑄金幣二十二年大旱二十三年大旱二十四年大旱王禱于桑林雨二十五年作大濩樂初巡狩定獻令二十七年遷九鼎于商邑二十九年陟外丙元年乙亥即位居亳命卿士伊尹二年陟仲壬元年丁丑王即位居亳命卿士伊尹四年陟太甲元年辛巳王即位居亳命卿士伊尹伊尹放太甲于桐乃自立七年王潛出自桐殺伊尹天大霧三日乃立其子伊陟伊奮命復其父之田宅而中分之十年大饗于太廟初祀方明十二年陟沃丁元年癸巳王即位居亳命卿士咎單八年祠保衡十九年陟小庚元年壬子王即位居亳五年陟小甲元年丁巳王即位居亳十七年陟雍己元年甲戌王即位居亳十二年陟太戊元年丙戌王即位居亳命卿士伊陟臣扈七年有桑穀生于朝十一年命巫咸禱于山川二十六年西戎來賓王使王孟聘西戎三十一年命費侯中衍為車正三十五年作寅車四十六年大有年五十八年城蒲姑六十一年東九夷來賓七十五年陟仲丁元年辛丑王即位自亳遷于囂于河上六年征藍夷九年陟外壬元年庚戌王即位居囂邳人姺人叛十年陟河亶甲元年庚申王即位自囂遷于相三年彭伯克邳四年征藍夷五年侁人入于班方彭伯韋伯伐班方侁人來賓九年陟祖乙元年己巳王即位自相遷于耿命彭伯韋伯二年圮于耿自耿遷于庇三年命卿士巫賢八年城庇十五年命邠侯高圉十九年陟祖辛元年戊子王即位居庇十四年陟開甲元年壬寅王即位居庇五年陟祖丁元年丁未王即位居庇九年陟南庚元年丙辰王即位居庇三年遷于奄六年陟陽甲元年壬戌王即位居奄三年西征丹山戎四年陟盤庚元年丙寅王即位居奄七年應侯來朝十四年自奄遷于北蒙曰殷十五年營殷邑十九年命邠侯亞圉二十八年陟小辛元年甲午王即位居殷三年陟小乙元年丁酉王即位居殷六年命世子武丁居于河學于甘盤十年陟武丁元年丁未王即位居殷命卿士甘盤三年夢求傅說得之六年命卿士傅說視學養老十二年報祀上甲微二十五年王子孝己卒于野二十九年肜祭太廟有雉來三十二年伐鬼方次于荊三十四年王師克鬼方氐羌來賓四十三年王師滅大彭五十年征豕韋克之五十九年陟祖庚元年丙午即位居殷作高宗之訓十一年陟祖甲元年丁巳王即位居殷十二年征西戎冬王返自西戎十三年西戎來賓命邠侯組紺二十四年重作湯刑二十七年命王子囂王子良三十三年陟馮辛元年庚寅王即位居殷四年陟庚丁元年甲午王即位居殷八年陟武乙元年壬寅王即位居殷邠遷于岐周三年自殷遷于河北命周公亶父賜以岐邑十五年自河北遷于沫二十一年周公亶父薨二十四年周師伐程戰于畢克之三十年周師伐義渠乃獲其君以歸三十四年周公季歷來朝王賜地三十里玉十瑴馬十匹三十五年周公季歷伐西落鬼戎王畋于河渭大雷震死文丁元年丁丑王即位居殷二年周公季歷伐燕京之戎敗績三年洹水一日三絶四年周公季歷伐余無之戎克之命為牧師五年周作程邑七年周公季歷伐始呼之戎克之十一年周公季歷伐翳徒之戎獲其三大夫來獻捷王殺季歷十二年有鳳集於岐山十三年陟帝乙元年庚寅王即位居殷三年王命南仲西拒昆夷城朔方夏六月周地震九年陟帝辛元年己亥王即位居殷命九侯周侯邘侯三年有雀生鸇四年大搜于黎作炮格之刑五年夏築南單之臺雨土于亳六年西伯初禴于畢九年王師伐有蘇獲妲己以歸作瓊室立玉門十年夏六月王畋于西郊十七年西伯伐翟冬王遊於淇二十一年春正月諸侯朝周伯夷叔齊自孤竹歸于周二十二年冬大搜于渭二十三年囚西伯于羑里二十九年釋西伯諸侯逆西伯歸于程三十年春三月西伯率諸侯入貢三十一年西伯治兵于畢得呂尚以為師三十二年五星聚于房有赤鳥集于周社密人侵阮西伯帥師伐密三十三年密人降于周師遂遷于程王錫命西伯得專征伐三十四年周師取耆及邘遂伐崇崇人降冬十二月昆夷侵周三十五年周大饑西伯自程遷于豐三十六年春正月諸侯朝于周遂伐昆夷西伯使世子發營鎬三十七年周作辟雍三十九年大夫辛甲出奔周四十年周作靈臺王使膠鬲求玉于周四十一年春三月西伯昌薨四十二年西伯發受丹書于呂尚有女子化為丈夫四十三年春大閲嶢山崩四十四年西伯發伐黎四十七年內史向摯出奔周四十八年夷羊見二日竝出五十一年冬十一月戊子周師渡盟津而還王囚箕子殺王子比干微子出奔五十二年庚寅周始伐殷秋周師次于鮮原冬十有二月周師有事于上帝庸蜀羌髳微盧彭濮從周師伐殷周武王十二年辛卯王率西夷諸侯伐殷敗之于野王親禽受于南單之臺遂分天之明立受子祿父是為武庚夏四月王歸于豐饗于太廟命監殷遂狩於管作大武樂十三年巢伯來賓薦殷于太廟遂大封諸侯秋大有年十四年王有疾周文公禱于壇墠作金縢十五年肅慎氏來賓初狩方嶽誥于沫邑冬遷九鼎于洛十六年箕子來朝秋王師滅蒲姑十七年命王世子誦于東宮冬十有二月王陟年五十四成王元年丁酉春正月王即位命冢宰周文公總百官庚午周公誥諸侯于皇門夏六月葬武王于畢秋王加元服武庚以殷叛周文公出居于東二年奄人徐人及淮夷入于邶以叛秋大雷電以風王逆周文公于郊遂伐殷三年王師滅殷殺武庚祿父遷殷民于衛遂伐奄滅蒲姑四年春正月初朝于廟夏四月初嘗麥王師伐淮夷遂入奄五年春正月王在奄遷其君于蒲姑夏五月王至自奄遷殷民于洛邑遂營成周六年大搜于岐陽七年周公復政于王春二月王如豐三月召康公如洛度邑甲子周文公誥多士于成周遂城東都王如東都諸侯來朝冬王歸自東都立高圉廟八年春正月王初蒞阼親政命魯侯禽父齊侯伋遷庶殷于魯作象舞冬十月王師滅唐遷其民于杜九年春正月有事于太廟初用勺肅慎氏來朝王使榮伯錫肅慎氏命十年王命唐叔虞為侯越裳氏來朝周文公出居于豐十一年春正月王如豐唐叔獻嘉禾王命唐叔歸禾于周文公王命周平公治東都十二年王帥燕師城韓王