人及犬戎入宗周弒王及鄭桓公犬戎殺王子伯服執褒姒以歸申侯魯侯許男鄭子立宜臼于申虢公翰立王子余臣于攜平王元年辛未王東徙洛邑錫文侯命晉侯會衛侯鄭伯秦伯以師從王入于成周二年秦作西畤魯孝公薨賜秦晉以邠岐之田三年齊人滅祝王錫司徒鄭伯命四年燕傾侯卒鄭人滅虢五年秦襄公帥師伐戎卒于師宋戴公薨六年燕哀侯卒鄭遷於溱洧七年楚子儀卒八年鄭殺其大夫關其思十年秦還于汧渭十三年魏武公薨十四年晉人滅韓十八年秦文公大敗戎師于岐來歸岐東之田二十一年晉文侯殺王子余臣于攜二十三年宋武公卒二十四年秦作陳寶祠二十五年晉文侯薨秦初用族刑二十六年晉封其弟成師于曲沃三十二年晉潘父弒其君昭侯納成師不克立昭侯之子孝侯晉人殺潘父三十三年楚人侵申三十六年衛莊公卒王人戍申四十年齊莊公卒晉曲沃桓叔成師卒子鱓立是為莊伯四十一年春大雨雪四十二年狄人伐翼至于晉郊宋襄公薨魯惠公使宰讓請郊廟之禮王使史角如魯諭止之四十七年晉曲沃莊伯入翼弒孝侯晉人逐之立孝侯子郤是為鄂侯四十八年無雲而雷魯惠公卒四十九年魯隱公及邾莊公盟于姑蔑五十一年春二月乙巳日有食之三月庚戌王陟桓王元年壬戌十月莊伯以曲沃叛伐翼公子萬救翼荀叔軫追之至于家谷翼侯焚曲沃之禾而還翼侯伐曲沃大捷武公請成于翼至相而還二年王使虢公伐晉之曲沃晉鄂侯卒曲沃莊伯復攻晉晉立鄂侯子光是為哀侯公子萬救翼荀叔軫追之至于家谷三年甲子四年曲沃莊伯卒子稱立是為武公尚一軍五年芮人乘京荀人董伯皆叛曲沃十一年曲沃獲晉哀侯晉人立哀侯子為小子侯芮伯萬出奔魏十二年王師秦師圍魏取芮伯萬而東之十三年冬曲沃伯誘晉小子侯殺之晉曲沃滅荀以其地賜大夫原氏黯是為荀叔戎人逆芮伯萬于郊十四年王命虢仲伐曲沃立晉哀侯弟緡于翼為晉侯十五年十六年春滅翼十九年鄭莊公卒二十三年三月乙未王陟莊王元年乙酉曲沃尚一軍異於晉六年五月葬桓王十五年王陟釐王元年庚子春齊桓公會諸侯于北杏以平宋亂三年曲沃武公滅晉侯緡以寶獻王王命武公以一軍為晉侯四年晉猶不與齊桓公之盟五年晉武公卒子詭諸立為獻公王陟惠王元年晉獻公朝王如成周周陽白兔舞于市二年王子頽亂王居于鄭鄭人入王府多取玉玉化為蜮射人九年晉城絳十六年晉獻公作二軍滅耿以賜大夫趙夙滅魏以賜大夫畢萬十七年衛懿公及赤狄戰于泂澤十九年晉獻公會虞師伐虢滅下陽虢公醜奔衛公命瑕父呂甥邑于國都二十五年春正月狄人伐晉王陟襄王元年庚午晉獻公卒立奚齊里克殺之及卓子立夷吾二年晉殺里克三年雨金于晉七年秦伯涉河伐晉十五年晉惠公卒子懷公圉立秦穆公帥師送公子重耳圍令狐桑泉臼衰皆降為秦師狐毛與先軫禦秦至于廬柳乃謂秦穆公使公子縶來與師言次于郇盟于軍公子重耳涉自河曲十六年晉殺子圉十七年晉城荀二十年周襄王會諸侯于河陽二十二年齊師逐鄭太子齒奔張城南鄭二十四年晉文公卒二十五年三十年洛絶于三十一年晉襄公卒三十二年三十三年王陟頃王元年癸卯六年彗星入北斗王陟匡王元年己酉六年王陟晉靈公為趙穿所殺趙盾使穿迎公子黑臀于周立之定王元年乙卯六年晉成公與狄伐秦獲秦諜殺之絳市六日而蘇七年晉成公卒于扈八年十八年齊國佐來獻玉磬紀公之甗二十一年王陟簡王元年丙子五年晉景公卒六年十三年晉厲公卒楚共王會宋平公于湖陽十四年王陟靈王元年庚寅十四年晉悼公卒十五年二十七年王陟景王元年丁巳十三年春有星出婺女十月晉平公卒十四年河水赤于龍門三里十九年晉昭公卒冬十二月桃杏花二十年二十五年晉頃公平王室亂立敬王敬王元年壬午八年晉頃公卒九年十四年漢不見于天二十六年晉青虹見二十八年洛絶于周三十六年淇絶于舊衛三十九年晉城頓丘四十三年宋殺其大夫皇瑗于丹水之上丹水壅不流四十四年王陟元王元年丙寅晉定公卒二年四年於越滅吳六年晉澮絶于梁丹水三日絶不流七年齊人鄭人伐衛王陟貞定王元年癸酉於越徙都琅琊四年十一月於越子勾踐卒是為菼執次鹿郢立六年晉河絶于扈七年晉荀瑤城南梁十年於越子鹿郢卒不壽立十一年晉出奔齊十二年河水赤三日荀瑤伐中山取窮魚之丘十三年晉韓龐取秦武城十六年十七年晉出公薨乃立昭公之孫是為敬公十八年二十年於越子不壽見殺是為盲姑次朱勾立二十二年楚滅蔡二十四年楚滅杞二十八年王陟考王元年魏文侯立十年楚滅莒十一年晉敬公卒十二年魯悼公卒十四年魯季孫會晉幽公于楚丘十五年王陟威烈王元年丙辰三年晉大旱地生鹽五年晉丹水出反潔六年晉大夫秦嬴賊幽公於高寢之上魏文侯立幽公子止七年趙獻子城泫氏韓武子都平陽八年趙城平邑九年楚人伐我南鄙至于上洛十一年田公子居思伐邯鄲圖平邑於越滅滕十二年於越子朱勾伐郯以郯子鴣歸十四年於越子朱勾卒子翳立十六年齊田盻及邯鄲韓舉戰于平邑邯鄲之師敗逋遂獲韓舉取平邑新城十七年魏文侯伐秦至鄭還築汾陰郃陽田悼子卒田布殺其大夫公孫孫公孫孫以廩丘叛于趙田布圍廩丘翟角趙孔屑韓氏救廩丘及田布戰于龍澤田師敗逋十八年王命韓景子趙烈子及我師伐齊入長垣二十三年王命晉卿魏氏趙氏韓氏為諸侯二十四年王陟安王元年庚辰九年晉烈公卒子桓公立十年己丑十五年魏文侯卒大風晝昏晉太子喜出奔十六年封公子緩二十一年韓滅鄭哀侯入于鄭二十三年於越遷于吳二十六年王陟魏城洛陽及安邑王垣七月於越太子諸咎弒其君翳十月越人殺諸咎越滑吳人立孚錯枝為君烈王元年丙午魏公子緩如邯鄲以作難於越大夫寺區定越亂立初無余是為莽安二年秦胡蘇帥師伐韓韓將韓襄敗胡蘇于酸水魏觴諸侯于范臺晉桓公邑哀侯于鄭韓山堅賊其君哀侯六年韓共侯趙成侯遷晉桓公于屯留趙成侯偃韓懿侯若伐我葵七年王陟我師伐趙圍蜀陽齊田壽帥師伐我圍觀觀降魏大夫王錯出奔韓顯王元年癸丑鄭城邢丘秦子向命為藍君二年河水赤于龍門三日三年公子景賈帥師伐鄭韓明戰于韓我師敗逋四年夏四月甲寅徙邦于大梁王發逄忌之藪以賜民於越寺區弟思弒其君莽安次無顓立五年雨碧于郢地忽長十丈有餘高尺半六年我師伐邯鄲取列人我師伐邯鄲取肥雨黍于齊七年我與邯鄲榆次陽邑王會鄭釐侯于巫沙八年入河水于圃田又為太溝而引圃水瑕陽人自秦導岷山青衣水來歸九年秦師伐鄭次于懷城殷十年楚師出河水以水長垣之外龍賈帥師築長城于西邊鄭取屯留尚子十一年鄭釐侯使許息來致地平丘戶牗首垣諸邑及鄭馳地我取枳道與鄭鹿王及鄭釐侯盟于巫沙以釋它陽之圍歸釐于鄭十二年魯恭侯宋桓侯衛成侯鄭釐侯來朝於越子無顓卒是為菼蠋卯次無疆立十三年邯鄲成侯會燕成侯于安邑十四年秦公孫壯伐鄭圍焦城不克秦公孫壯帥師城上枳安陵山民邯鄲伐衛取漆富兵城之齊師及燕戰于泃水齊師遁十五年齊田期伐我東鄙戰于桂陽我師敗逋東周與鄭高都鄭釐侯來朝中陽宋景鼓衛公孫倉會師圍我襄陵十六年王以韓師諸侯師縣于襄陵齊侯使楚景舍來求成邯鄲之師敗我師于桂陵十七年燕伐趙圍濁鹿趙靈王及代人救濁鹿敗燕師于勺晉取玄武濩澤十八年齊築防以為長城十九年王如衛命公子南為侯二十年二十一年魏殷臣趙公孫裒伐燕還取夏屋城曲逆二十二年壬寅孫何侵楚人三戶郛楚伐徐州二十三年魏章帥師及鄭師伐楚取上蔡孫何取㶏陽秦孝公會諸侯于逄澤絳中地坼西絶于汾二十四年魏敗韓馬陵二十五年二十六年穰疪帥師及鄭孔夜戰于梁赫鄭師敗逋與齊田肹戰于馬陵二十七年五月齊田肹及宋人伐我東鄙圍平陽九月秦衛鞅伐我西鄙十月邯鄲伐我北鄙王攻衛鞅我師敗逋二十八年城濟陽秦封衛鞅于塢改名曰尚二十九年邳遷于薛三月為大溝于北郛以行圃田之水三十年三十一年秦蘇胡帥師伐鄭韓襄敗秦蘇胡于酸水三十二年三十三年鄭威侯與邯鄲圍襄陵三十四年魏惠成王三十六年改元稱一年王與諸侯會于徐州於越子無疆伐楚三十五年楚吾得帥師及秦伐鄭圍綸氏三十六年楚圍齊於徐州遂伐於越殺無疆三十七年三十八年龍賈及秦師戰于雕陰我師敗逋王會鄭威侯于巫沙三十九年秦取我汾陰皮氏四十年四十一年秦歸我焦曲沃四十二年九鼎淪泗沒于淵四十三年四十四年四十五年楚敗我襄陵四十六年四十七年四十八年王陟慎靚王元年辛丑秦取我曲沃平周二年魏惠成王薨三年今王元年四年五年六年鄭侯使韓辰歸晉陽及向二月城陽向更名陽為河雍向為高平隱王元年丁未十月鄭宣王來朝燕子之殺公子平不克齊師殺子之醢其身二年齊地景長長丈餘高一尺魏以張儀為相三年韓明帥師伐襄丘秦王來見于蒲坂關四月越王使公師隅來獻舟三百箭五百萬及犀角象齒五月張儀卒四年翟章伐衛魏敗趙將韓舉五年洛入成周山水大出六年十月大霖雨疾風河水酸棗楚庶章帥師來會我次于襄丘七年翟章救鄭次于南屈八年秦公孫爰帥師伐我皮氏翟章帥師救皮氏圍疾西風九年城皮氏十年十一年十二年秦拔我蒲坂晉陽封谷十三年邯鄲命吏大夫奴遷于九原將軍大夫適子代史皆貂服十四年十五年薛侯來會王于釜丘楚入雍氏楚人敗十六年王與齊王會于韓今王終二十年
