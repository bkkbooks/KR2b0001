  - {type: variant, offset: 69, length: 0, content: '', WYG: 庚申天露三日三夜晝昏帝問天老力牧容成曰於公何如天老曰臣聞之國安其主好文則鳯凰居之國亂其主好武則鳯凰去之今鳯凰翔於東郊而樂之其鳴音中夷則與天相副以是觀之天有嚴教以賜帝帝勿犯也召史卜之龜燋史曰臣不能占也其問之聖人帝曰已問天老力牧容成矣史北面再拜曰龜不違聖智故燋霧既降游于洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流於海得圖書焉龍圖出河龜書出洛赤文篆字以授軒轅接萬神於明庭今塞門谷口是也}
