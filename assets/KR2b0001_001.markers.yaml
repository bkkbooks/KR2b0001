  - {type: variant, offset: 647, length: 0, content: '', SBCK: 毋曰脩巳出行見流星貫昴夢接意感旣而吞神珠脩巳背剖而生禹於石紐虎鼻大口兩耳參鏤首戴鉤鈴􅅐有玉斗足文履巳故名文命長有聖德長九尺九寸夢自洗於河取水飲之又有白狐九尾之瑞當堯之世舜舉之禹觀於河有長人白面魚身出曰吾河精也呼禹曰文命治水言訖授禹河圖言治水之事乃退入于淵禹治水旣畢天錫玄珪以告成功夏道將興草木暢茂靑龍止於郊祝融之神降于崇山乃受舜禪卽天子之位洛出龜書是爲洪範三年喪畢都于陽城}
