  - {type: variant, offset: 7415, length: 1946, content: 丹水壅不流四十四年王陟元王元年丙寅晉定公卒二年四年於越滅吳六年晉澮絕于梁丹水三日絕不流七年齊人鄭人伐衛王陟貞定王元年癸酉於越徙都瑯琊四年十一月於越子勾踐卒是為菼執次鹿郢立六年晉河絕于扈七年晉荀瑤城南梁十年於越子鹿郢卒不壽立十一年晉出奔齊十二年河水赤三日荀瑤伐中山取窮魚之丘十三年晉韓龐取秦武城十六年十七年晉出公薨乃立昭公之孫是為敬公十八年二十年於越子不壽見殺是為盲姑次朱勾立二十二年楚滅蔡二十四年楚滅杞二十八年王陟考王元年魏文侯立十年楚滅莒十一年晉敬公卒十二年魯悼公卒十四年魯季孫會晉幽公于楚丘十五年王陟威烈王元年丙辰三年晉大旱地生鹽五年晉丹水出反潔六年晉大夫秦嬴賊幽公於高寢之上魏文侯立幽公子止七年趙獻子城泫氏韓武子都平陽八年趙城平邑九年楚人伐我南鄙至于上洛十一年田公子居思伐邯鄲圖平邑於越滅滕十二年於越子朱勾伐郯以郯子鴣歸十四年於越子朱勾卒子翳立十六年齊田盻及邯鄲韓舉戰于平邑邯鄲之師敗逋遂獲韓舉取平邑新城十七年魏文侯伐秦至鄭還築汾陰郃陽田悼子卒田布殺其大夫公孫孫公孫孫以廩丘叛于趙田布圍廩丘翟角趙孔屑韓氏救廩丘及田布戰于龍澤田師敗逋十八年王命韓景子趙烈子及我師伐齊入長垣二十三年王命晉卿魏氏趙氏韓氏為諸侯二十四年王陟安王元年庚辰九年晉烈公卒子桓公立十年己丑十五年魏文侯卒大風晝昏晉太子喜出奔十六年封公子緩二十一年韓滅鄭哀侯入于鄭二十三年於越遷于吳二十六年王陟魏城洛陽及安邑王垣七月於越太子諸咎弒其君翳十月越人殺諸咎越滑吳人立孚錯枝為君烈王元年丙午魏公子緩如邯鄲以作難於越大夫寺區定越亂立初無余是為莽安二年秦胡蘇帥師伐韓韓將韓襄敗胡蘇于酸水魏觴諸侯于范臺晉桓公邑哀侯于鄭韓山堅賊其君哀侯六年韓共侯趙成侯遷晉桓公于屯留趙成侯偃韓懿侯若伐我葵七年王陟我師伐趙圍蜀陽齊田壽帥師伐我圍觀觀降魏大夫王錯出奔韓顯王元年癸丑鄭城邢丘秦子向命為藍君二年河水赤于龍門三日三年公子景賈帥師伐鄭韓明戰于韓我師敗逋四年夏四月甲寅徙邦于大梁王發逄忌之藪以賜民於越寺區弟思弒其君莽安次無顓立五年雨碧于郢地忽長十丈有餘高尺半六年我師伐邯鄲取列人我師伐邯鄲取肥雨黍于齊七年我與邯鄲榆次陽邑王會鄭釐侯于巫沙八年入河水于圃田又為太溝而引圃水瑕陽人自秦導岷山青衣水來歸九年秦師伐鄭次于懷城殷十年楚師出河水以水長垣之外龍賈帥師築長城于西邊鄭取屯留尚子十一年鄭釐侯使許息來致地平丘戶牗首垣諸邑及鄭馳地我取枳道與鄭鹿王及鄭釐侯盟于巫沙以釋它陽之圍歸釐于鄭十二年魯恭侯宋桓侯衛成侯鄭釐侯來朝於越子無顓卒是為菼蠋卯次無疆立十三年邯鄲成侯會燕成侯于安邑十四年秦公孫壯伐鄭圍焦城不克秦公孫壯帥師城上枳安陵山民邯鄲伐衛取漆富兵城之齊師及燕戰于泃水齊師遁十五年齊田期伐我東鄙戰于桂陽我師敗逋東周與鄭高都鄭釐侯來朝中陽宋景鼓衛公孫倉會師圍我襄陵十六年王以韓師諸侯師縣于襄陵齊侯使楚景舍來求成邯鄲之師敗我師于桂陵十七年燕伐趙圍濁鹿趙靈王及代人救濁鹿敗燕師于勺晉取玄武濩澤十八年齊築防以為長城十九年王如衛命公子南為侯二十年二十一年魏殷臣趙公孫裒伐燕還取夏屋城曲逆二十二年壬寅孫何侵楚人三戶郛楚伐徐州二十三年魏章帥師及鄭師伐楚取上蔡孫何取㶏陽秦孝公會諸侯于逄澤絳中地坼西絕于汾二十四年魏敗韓馬陵二十五年二十六年穰疪帥師及鄭孔夜戰于梁赫鄭師敗逋與齊田肹戰于馬陵二十七年五月齊田肹及宋人伐我東鄙圍平陽九月秦衛鞅伐我西鄙十月邯鄲伐我北鄙王攻衛鞅我師敗逋二十八年城濟陽秦封衛鞅于鄔改名曰尚二十九年邳遷于薛三月為大溝于北郛以行圃田之水三十年三十一年秦蘇胡帥師伐鄭韓襄敗秦蘇胡于酸水三十二年三十三年鄭威侯與邯鄲圍襄陵三十四年魏惠成王三十六年改元稱一年王與諸侯會于徐州於越子無疆伐楚三十五年楚吾得帥師及秦伐鄭圍綸氏三十六年楚圍齊於徐州遂伐於越殺無疆三十七年三十八年龍賈及秦師戰于雕陰我師敗逋王會鄭威侯于巫沙三十九年秦取我汾陰皮氏四十年四十一年秦歸我焦曲沃四十二年九鼎淪泗沒于淵四十三年四十四年四十五年楚敗我襄陵四十六年四十七年四十八年王陟慎靚王元年辛丑秦取我曲沃平周二年魏惠成王薨三年今王元年四年五年六年鄭侯使韓辰歸晉陽及向二月城陽向更名陽為河雍向為高平隱王元年丁未十月鄭宣王來朝燕子之殺公子平不克齊師殺子之醢其身二年齊地景長長丈餘高一尺魏以張儀為相三年韓明帥師伐襄丘秦王來見于蒲坂關四月越王使公師隅來獻舟三百箭五百萬及犀角象齒五月張儀卒四年翟章伐衛魏敗趙將韓舉五年洛入成周山水大出六年十月大霖雨疾風河水酸棗楚庶章帥師來會我次于襄丘七年翟章救鄭次于南屈八年秦公孫爰帥師伐我皮氏翟章帥師救皮氏圍疾西風九年城皮氏十年十一年十二年秦拔我蒲坂晉陽封谷十三年邯鄲命吏大夫奴遷于九原將軍大夫適子代史皆貂服十四年十五年薛侯來會王于釜丘楚入雍氏楚人敗十六年王與齊王會于韓今王終二十年, WYG: ''}
