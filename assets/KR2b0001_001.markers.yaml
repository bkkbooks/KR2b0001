  - {type: variant, offset: 31, length: 0, content: '', WYG: 母曰附寳見大電繞北斗樞星光照郊野感而孕二十五月而生帝於夀丘弱而能言龍顔有聖徳劾百神朝而使之應龍攻蚩尤戰虎豹熊羆四獸之力以女魃止淫雨天下既定聖徳光被羣瑞畢臻有屈軼之草生於庭佞人入朝則草指之是以佞人不敢進}
