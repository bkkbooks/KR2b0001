  - {type: variant, offset: 3619, length: 532, content: 命王世子誦于東宮冬十有二月王陟年五十四成王元年丁酉春正月王即位命冢宰周文公總百官庚午周公誥諸侯于皇門夏六月葬武王于畢秋王加元服武庚以殷叛周文公出居于東二年奄人徐人及淮夷入于邶以叛秋大雷電以風王逆周文公于郊遂伐殷三年王師滅殷殺武庚祿父遷殷民于衛遂伐奄滅蒲姑四年春正月初朝于廟夏四月初嘗麥王師伐淮夷遂入奄五年春正月王在奄遷其君于蒲姑夏五月王至自奄遷殷民于洛邑遂營成周六年大蒐于岐陽七年周公復政于王春二月王如豐三月召康公如洛度邑甲子周文公誥多士于成周遂城東都王如東都諸侯來朝冬王歸自東都立高圉廟八年春正月王初莅阼親政命魯侯禽父齊侯伋遷庶殷于魯作象舞冬十月王師滅唐遷其民于杜九年春正月有事于太廟初用勺肅慎氏來朝王使榮伯錫肅慎氏命十年王命唐叔虞為侯越裳氏來朝周文公出居于豐十一年春正月王如豐唐叔獻嘉禾王命唐叔歸禾于周文公王命周平公治東都十二年王帥燕師城韓王錫韓侯命十三年王師會齊侯魯侯伐戎夏六月魯大禘于周公廟十四年秦師圍曲城克之冬洛邑告成十八年春正月王如洛邑定鼎鳳凰見遂有事于河十九年王巡狩侯甸方岳召康公從歸于宗周遂正百官黜豐侯二十一年除治象周文公薨于豐二十二年葬周文公于畢二十四年於越來賓二十五年王大會諸侯于東都四夷來賓冬十月歸自東都有事于太廟三十年離戎來賓三十三年王遊于, WYG: ''}
