  - {type: variant, offset: 502, length: 0, content: '', SBCK: 在位十有四年奏鐘石笙管未罷而天大靁􅀨疾風登屋拔木桴鼓播地鐘亂行舞人頓伏樂正狂走舜乃磬堵持衡而􅀏曰明哉天下非一人之天下也亦乃見于鐘石笙筦乎乃薦禹於天使行天子事也于時和氣普應慶雲興焉若烟非烟若雲非雲郁郁紛紛蕭索輪囷百工相和而歌卿雲帝乃倡之曰慶雲爛兮禮縵縵兮日月光華旦復旦兮羣臣咸進頓首曰明明上天爛然星陳日月光華弘于一人帝乃再歌曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷于聖賢莫不咸聽鼚乎鼓之軒乎舞之精華以竭褰裳去之於是八風循通慶雲叢聚蟠龍奮迅於其藏蛟魚踊躍於其淵龜鱉咸出其穴遷虞而事夏舜乃設壇於河依堯故事至于下昃榮光休至黃龍􅀒圖長三十二尺廣九尺出于壇畔赤文綠錯其文言當禪禹}
