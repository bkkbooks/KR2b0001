  - {type: variant, offset: 647, length: 0, content: '', WYG: 母曰修己出行見流星貫􅄧夢接意感既而吞神珠修己背剖而生禹於石紐虎鼻口兩耳參鏤首戴鈎鈐胸有玉斗足文履已故名文命長有聖徳長九尺九寸夢自洗於河取水飲之又有白狐九尾之瑞當堯之世舜舉之禹觀於河有長人白面魚身出曰吾河精也呼禹曰文命治水言訖授禹河圖言治水之事乃退入于淵禹治水既畢天錫𤣥圭以告成功夏道將興草木暢茂青龍止于郊祝融之神降于崇山乃受舜禪即天子之位洛出龜書是為洪範三年喪畢都于陽城}
