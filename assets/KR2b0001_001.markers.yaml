  - {type: variant, offset: 3590, length: 270, content: 狩方岳誥于沫邑冬遷九鼎于洛十六年箕子來朝秋王師滅蒲姑十七年命王世子誦于東宮冬十有二月王陟年五十四成王元年丁酉春正月王即位命冢宰周文公總百官庚午周公誥諸侯于皇門夏六月葬武王于畢秋王加元服武庚以殷叛周文公出居于東二年奄人徐人及淮夷入于邶以叛秋大雷電以風王逆周文公于郊遂伐殷三年王師滅殷殺武庚祿父遷殷民于衛遂伐奄滅蒲姑四年春正月初朝于廟夏四月初嘗麥王師伐淮夷遂入奄五年春正月王在奄遷其君于蒲姑夏五月王至自奄遷殷民于洛邑遂營成周六年大蒐于岐陽七年周公復政于王春二月王如豐三月召康公如洛度邑甲子周文公誥多士于成周遂城東都王如東都諸侯來朝冬王歸自東都立, SBCK: ''}
