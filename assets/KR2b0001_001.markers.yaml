  - {type: variant, offset: 1840, length: 0, content: '', SBCK: 名履湯有七名而九征放桀于南巢而還諸侯八譯而來者千八百國奇肱氏以車至乃同尊天乙履爲天子三讓遂卽天子之位初高辛氏之世妃曰簡狄以春分玄鳥至之日從帝祀郊禖與其妹浴於玄丘之水有玄鳥衘􅆗而墜之五色甚好二人競取覆以二筐簡狄先得而吞之遂孕􅅐剖而生契長爲堯司徒成功於民受封於商後十三世生主癸主癸之妃曰扶都見白氣貫月意感以乙日生湯號天乙豐下銳上晢而有䫇句身而揚聲長九尺臂有四肘是爲成湯湯在亳能脩其德伊摯將應湯命夢乗船過日月之傍湯乃東至于洛觀帝堯之壇沈璧退立黃魚􅀟踴黒鳥隨之止于壇化爲黒玉又有黒龜竝赤文成字言夏桀無道湯當代之檮杌之神見于邳山有神牽白狼衘鉤而入商朝金德將盛銀自山溢湯將奉天命放桀夢及天而䑛之遂有天下商人後改天下之號曰殷}
  - {type: page-break, offset: 1840, content: '', id: KR2b0001_SBCK_001-21b}
  - {type: page-break, offset: 1840, content: '', id: KR2b0001_SBCK_001-22a}
  - {type: variant, offset: 1840, length: 0, content: '', WYG: 名履湯有七名而九征放桀于南巢而還諸侯八譯而来者千八百國竒肱氏以車至乃同尊天乙履為天子三讓遂即天子之位初髙辛氏之世妃曰簡狄以春分𤣥鳥至之日從帝祀郊禖與其妹浴于𤣥丘之水有𤣥鳥銜卵而墜之五色甚好二人競取覆以二筐簡狄先得而吞之遂孕胸剖而生契長為堯司徒成功於民受封於商後十三世生主癸主癸之妃曰扶都見白氣貫月意感以乙日生湯號天乙豐下銳上晳而有䫇句身而揚聲長九尺臂有四肘是為成湯湯在亳能修其徳伊摯將應湯命夢乗船過日月之傍湯乃東至于洛觀帝堯之壇沈璧退立黄魚雙踴黒鳥隨之止于壇化為黒玉又有黒龜竝赤文成字言夏桀無道湯當代之檮杌之神見于邳山有神牽白狼銜鉤而入商朝金徳將盛銀自山溢湯將奉天命放桀夢及天而䑛之遂有天下商人後改天下之號曰殷}
