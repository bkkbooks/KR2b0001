  - {type: variant, offset: 53, length: 0, content: '', WYG: 有景雲之瑞赤方氣與青方氣相連赤方中有兩星青方中有一星凡三星皆黄色以天清明時見於攝提名曰景星帝黄服齋於中宫坐於𤣥扈洛水之上有鳯凰集不食生蟲不履生草或止帝之東園或巢於阿閣或鳴於庭其雄自歌其雌自舞麒麟在囿神鳥来儀有大螻如羊大螾如虹帝以土氣勝遂以土徳王}
