  - {type: variant, offset: 1092, length: 0, content: '', SBCK: 乙巳年明年后緍生少康旣長爲仍牧正惎澆能戒之澆使椒求之將至仍少康逃奔有虞爲之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其德而兆其謀以􅀵夏衆撫其官職夏之遺臣伯靡自有鬲氏􅀵二斟之燼以伐浞浞恃澆皆康娛日忘其惡而不爲備少康使汝艾諜澆初浞娶純狐氏有子早死其婦曰女岐寡居澆強圉往至其戸陽有所求女岐爲之􅒌裳共舍而宿汝艾夜使人襲斷其首乃女岐也澆旣多力又善害艾乃畋獵放犬逐獸因嗾澆顚隕乃斬澆以歸于少康於是夏衆滅浞奉少康歸于夏邑諸侯始聞之立爲天子祀夏配天不失舊物}
  - {type: page-break, offset: 1092, content: '', id: KR2b0001_SBCK_001-14b}
  - {type: page-break, offset: 1092, content: '', id: KR2b0001_SBCK_001-15a}
  - {type: variant, offset: 1092, length: 0, content: '', WYG: 乙巳年明年后緡生少康既長為仍牧正惎澆能戒之澆使椒求之將至仍少康逃奔有虞為之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其徳而兆其謀以收夏衆撫其官職夏之遺臣伯靡自有鬲氏收二斟之燼以伐浞浞恃澆皆康娛日忘其惡而不為備少康使汝艾諜澆初浞娶純狐氏有子早死其婦曰女岐寡居澆强圉徃至其户陽有所求女岐為之縫裳共舎而宿汝艾夜使人襲斷其首乃女岐也澆既多力又善走艾乃田獵放犬逐獸因嗾澆顛隕乃斬澆以歸于少康於是夏衆滅浞奉少康歸于夏邑諸侯始聞之立為天子祀夏配天不失舊物}
