  - {type: variant, offset: 0, length: 401, content: 四部叢刊本所收今本竹書紀年四部叢刊本所收今本竹書紀年黃帝軒轅氏元年帝即位居有熊初制冕服二十年景雲見以雲紀官五十年秋七月庚申鳳鳥至帝祭于洛水五十九年貫胸氏來賓長股氏來賓七十七年昌意降居若水產帝乾荒一百年地裂帝陟帝摯少昊氏帝顓頊高陽氏元年帝即位居濮十三年初作曆象二十一年作承雲之樂三十年帝產伯鯀居天穆之陽七十八年帝陟術器作亂辛侯滅之帝嚳高辛氏元年帝即位居亳十六年帝使重帥師滅有鄶四十五年帝錫唐侯命六十三年帝陟帝堯陶唐氏元年丙子帝即位居冀命羲和曆象五年初巡狩四岳七年有麟十二年初治兵十六年渠搜氏來賓十九年命共工治河二十九年春僬僥氏來朝貢沒羽四十二年景星見于翼五十年帝遊于首山乘素車玄駒五十三年帝祭于洛五十八年帝使后稷放帝子朱于丹水六十一年命崇伯鯀治河六十九年黜崇伯鯀七十年春正月帝使四岳錫虞舜命七十一年帝命二女嬪于舜七十三年春正月舜受終于文祖七十四年虞舜初巡狩四岳七十五年司空禹治河七十六年司空伐曹魏之戎克之, SBCK: ''}
