  - {type: variant, offset: 3861, length: 5500, content: 圉廟八年春正月王初莅阼親政命魯侯禽父齊侯伋遷庶殷于魯作象舞冬十月王師滅唐遷其民于杜九年春正月有事于太廟初用勺肅慎氏來朝王使榮伯錫肅慎氏命十年王命唐叔虞為侯越裳氏來朝周文公出居于豐十一年春正月王如豐唐叔獻嘉禾王命唐叔歸禾于周文公王命周平公治東都十二年王帥燕師城韓王錫韓侯命十三年王師會齊侯魯侯伐戎夏六月魯大禘于周公廟十四年秦師圍曲城克之冬洛邑告成十八年春正月王如洛邑定鼎鳳凰見遂有事于河十九年王巡狩侯甸方岳召康公從歸于宗周遂正百官黜豐侯二十一年除治象周文公薨于豐二十二年葬周文公于畢二十四年於越來賓二十五年王大會諸侯于東都四夷來賓冬十月歸自東都有事于太廟三十年離戎來賓三十三年王遊于卷阿召康公從歸于宗周命王世子釗如房逆女房伯祈歸于宗周三十四年雨金于咸陽三十七年夏四月乙丑王陟康王元年甲戌春正月王即位命冢宰召康公總百官諸侯朝于豐宮三年定樂歌吉禘于先王申戒農官告于廟六年齊太公薨九年唐遷于晉作宮而美王使人讓之十二年夏六月壬申王如豐錫畢公命秋毛懿公薨十六年錫齊侯伋命王南巡狩至九江廬山十九年魯侯禽父薨二十一年魯築茅闕門二十四年召康公薨二十六年秋九月己未王陟昭王元年庚子春正月王即位復設象魏六年王錫郇伯命冬十二月桃李華十四年夏四月恆星不見秋七月魯人弒其君宰十六年伐楚涉漢遇大兕十九年春有星孛于紫微祭公辛伯從王伐楚天大曀雉兔皆震喪六師于漢王陟穆王元年己未春正月王即位作昭宮命辛伯餘靡冬十月築祇宮于南鄭六年春徐子誕來朝錫命為伯八年春北唐來賓獻一驪馬是生騄耳九年築春宮十一年王命卿士祭公謀父十二年毛公班共公利逄公固帥師從王伐犬戎冬十月王北巡狩遂征犬戎十三年春祭公帥師從王西征次于陽紆秋七月西戎來賓徐戎侵洛冬十月造父御王入于宗周十四年王帥楚子伐徐戎克之夏四月王畋于軍丘五月作范宮秋九月翟人侵畢冬蒐于萍澤作虎牢十五年春正月留昆氏來賓作重壁臺冬王觀于鹽澤十六年霍侯舊薨王命造父封于趙十七年王西征昆侖丘見西王母其年西王母來朝賓于昭宮秋八月遷戎于太原十八年春正月王居祇宮諸侯來朝二十一年祭文公薨二十四年王命左史戎夫作記三十五年荊人入徐毛伯遷帥師敗荊人于泲三十七年大起九師東至于九江架黿鼉以為梁遂伐越至于紆荊人來貢三十九年王會諸侯于塗山四十五年魯侯㵒薨五十一年作呂刑命甫侯于豐五十五年王陟于祇宮共王元年甲寅春正月王即位四年王師滅密九年春正月丁亥王使內史良錫毛伯遷命十二年王陟懿王元年丙寅春正月王即位天再旦于鄭七年西戎侵鎬十三年翟人侵岐十五年王自宗周遷于槐里十七年魯厲公擢薨二十一年虢公帥師北伐犬戎敗逋二十五年王陟孝王元年辛卯春正月王即位命申侯伐西戎五年西戎來獻馬七年冬大雨電江漢水八年初牧于汧渭九年王陟夷王元年庚子春正月王即位二年蜀人呂人來獻瓊玉賓于河用介珪三年王致諸侯烹齊哀公于鼎六年王獵于社林獲犀牛一以歸七年虢公帥師伐太原之戎至于俞泉獲馬千匹冬雨雹大如礪楚子熊渠伐庸至于鄂八年王有疾諸侯祈于山川王陟厲王元年戊申春正月王即位作夷宮命卿士榮夷公落楚人來獻龜貝三年淮夷侵洛王命虢公長父伐之不克齊獻公山薨六年楚子延卒八年初監謗芮伯良夫戒百官于朝十一年西戎入于犬丘十二年王亡奔彘國人圍王宮執召穆公之子殺之十三年王在彘共伯和攝行天子事十四年玁狁侵宗周西鄙召穆公帥師追荊蠻至于洛十六年蔡武侯薨楚子勇卒十九年曹夷伯薨二十二年大旱陳幽公薨二十三年大旱宋僖公薨二十四年大旱杞武公薨二十五年大旱楚子嚴卒二十六年大旱王陟于彘周定公召穆公立太子靖為王共伯和歸其國遂大雨宣王元年甲戌春正月王即位周定公召穆公輔政復田賦作戎車燕惠侯薨二年錫太師皇父司馬休父命魯慎公薨曹公子蘇弒其君幽伯疆三年王命大夫仲伐西戎齊武公壽薨四年王命蹶父如韓韓侯來朝五年夏六月尹吉甫帥師伐玁狁至于太原秋八月方叔帥師伐荊蠻六年召穆公帥師伐淮夷王帥師伐徐戎皇父休父從王伐徐戎次于淮王歸自伐徐錫召穆公命西戎殺秦仲楚子霜卒七年王錫申伯命王命樊侯仲山甫城齊八年初考室魯武公來朝錫魯世子戲命九年王會諸侯于東都遂守于甫十二年魯武公薨齊人弒其君厲公無忌立公子赤十五年衛釐侯薨王錫虢文公命十六年晉遷于絳十八年蔡夷侯薨二十一年魯公子伯御弒其君懿公戲二十二年王錫王子多父命居洛二十四年齊文公赤薨二十五年大旱王禱于郊廟遂雨二十七年宋惠公覸薨二十八年楚子狥卒二十九年初不藉千畝三十年有兔舞于鎬京三十二年王師伐魯殺伯御命孝公稱于夷宮陳僖公孝薨有馬化為人三十三年齊成公薨王師伐太原之戎不克三十七年有馬化為狐燕僖侯卒楚子鄂卒三十八年王師及晉穆侯伐條戎奔戎王師敗逋三十九年王師伐姜戎戰于千畝王師敗逋四十年料民于太原戎人滅姜邑晉人敗北戎于汾隰四十一年王師敗于申四十三年王殺大夫杜伯其子隰叔出奔晉晉穆侯費生薨弟殤叔自立世子仇出奔四十四年四十六年王陟幽王元年庚申春正月王即位晉世子仇歸于晉殺殤叔晉人立仇是為文