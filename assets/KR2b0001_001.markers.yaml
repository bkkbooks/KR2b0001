  - {type: variant, offset: 344, length: 0, content: '', WYG: 帝在位七十年景星出翼鳯皇在庭朱草生嘉禾秀甘露潤醴泉出日月如合璧五星如聨珠厨中自生肉其薄如箑搖動則風生食物寒而不臭名曰箑脯又有草莢階而生月朔始生一莢月半而生十五莢十六日以後日落一莢及晦而盡月小則一莢焦而不落名曰蓂莢一曰厯莢洪水既平歸功於舜將以天下禪之乃潔齊修壇場於河洛擇良日率舜等升首山遵河渚有五老㳺焉蓋五星之精也相謂曰河圖將来告帝以期知我者重瞳黄姚五老因飛為流星上入昴二月辛丑昧明禮備至於日昃榮光出河休氣四塞白雲起回風搖乃有龍馬銜甲赤文緑色縁壇而上吐甲圖而去甲似龜背廣九尺其圖以白玉為檢赤土為泥似黄金約以青繩檢文曰闓色授帝舜言虞夏當授天命帝乃寫其言藏於東序後二年二月仲辛率羣臣沈璧於洛禮畢退俟至于下昃赤光起元龜負書而出背甲赤文成字止壇其書言當禪舜遂讓舜}
