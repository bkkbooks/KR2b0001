  - {type: variant, offset: 115, length: 779, content: 丹水舜耕于歷夢眉長與髮等遂登庸命咎陶作刑三苗將亡天雨血夏有冰地坼及泉青龍生于廟日夜出晝日不出夏后氏禹禹都陽城黃帝至禹為三十世夏禹未遇夢乘舟月中過而後受虞室之禪禹立四十五年啟啟曰會益干啟位啟殺之九年舞九韶二十五年征西河二十九年陟年九十八太康太康居斟鄩乃失邦羿居斟鄩仲康相后相即位處商邱元年征淮夷畎夷二年征風夷及黃夷七年于夷來賓相居斟灌少康少康即位方夷來賓獻其樂舞帝杼帝杼居原自原遷于老邱柏杼子征于東海及三壽得一狐九尾后芬發后芬發即位二年九夷來御曰畎夷千夷方夷黃夷白夷赤夷元夷風夷陽夷洛伯用與河伯馮夷鬭后芬立四十四年后荒后荒即位元年以元珪賓于河命九東狩于海獲大魚后芒在位五十八年陟后泄王亥託于有易河伯僕牛殷王子亥賓于有易而淫焉有易之君緜臣殺而放之故殷上甲微假師于河伯以伐有易滅之遂殺其君緜臣后泄二十一年命畎夷白夷赤夷元夷風夷陽夷繇是服從陟不降不降即位六年伐九苑六十九年其弟立是為帝扃帝扃帝廑帝廑一名胤甲允甲允甲即位居西河允甲在位四十歲天有祅孼十日並照于東陽其年允甲陟本有十日迭次而出運照無窮孔甲后昊后昊立三年后發后發一名后敬或曰發惠后發即位元年諸夷賓于王門冉保墉會于上池諸夷入舞其子立為傑后桀居斟鄩畎夷入居豳岐之閒不窋之晜孫后桀命扁伐岷山岷山莊王女于桀二人曰琬曰琰桀愛一人女無子焉斲其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰末喜氏築傾宮飾瑤臺作瓊室立玉門末喜氏以與伊尹交遂以閒夏築傾宮飾瑤臺社坼裂湯遂滅夏桀逃南巢氏凡夏自禹以至于桀十七王有王與無王用歲四百七十一年商湯湯有七名而九征外丙外丙勝即位居亳仲壬仲壬即位居毫命卿士伊尹伊尹祠桐宮歌曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷于聖賢莫不咸聽鼚乎鼓之軒乎舞之精華以竭褰裳去之仲壬崩立大甲伊尹放大甲于桐乃自立大甲伊尹即位放大甲七年大甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之伊尹年百有五歲大甲, SBCK: 鎬}
