  - {type: variant, offset: 51, length: 3, content: 削木為, SBCK: 又取而置寒冰上大鳥以一翼籍覆之姜嫄以爲異乃􅀵養焉名之曰棄枝頥有異相長爲堯稷官有功於民后稷之孫曰公劉有德諸侯皆以天子之禮待之初}
  - {type: page-break, offset: 51, content: '', id: KR2b0001_SBCK_002-1b}
  - {type: variant, offset: 57, length: 2, content: 像帥, SBCK: 世䜟言曰西北爲王期在甲子昌制命發行誅旦行道及公劉之後十三世而生季歷季歷之十年飛龍盈於殷之牧野此蓋聖人在下位將起之符也季歷之妃曰大任夢長人感巳􅘞于豕牢而生昌是爲周文王龍顏虎肩身長十尺􅅐有四乳大王曰吾世當有興者其在昌乎季歷之兄曰太伯知天命在昌適越終身不反弟仲雝從之故季歷爲嗣以及昌昌爲西伯作邑于豐文王之妃曰太姒夢商庭生􅁄太子發植梓樹於闕間化爲松栢棫柞以告文王文王幣率羣臣與發竝拜告夢季秋之甲子赤爵銜書及豐置于昌戸昌拜稽首受其文要曰􅁎昌蒼帝子亡殷者紂王將畋史編卜之曰將大􅀗非熊非罷天遣大師以佐昌臣太祖史疇爲禹卜畋得臯陶其兆􅀋此至于磻溪之水呂尚釣於涯王下趨拜曰望公七年乃今見光景于斯尚立變名荅曰望釣得玉璜其文要曰􅁎受命昌來提撰爾洛鈴報在齊尚出游見赤人自洛岀授尚書命曰召佐昌者子文王夢日月著其身又鸑鷟鳴於􅄮山孟春六旬五緯聚房後有鳳凰銜書游文王之都書又曰殷帝無道虐亂天下星命巳移不得復久靈祇遠離百神吹去五星聚房昭理四海文王旣沒太子發代立是爲武王武王騈齒望羊將伐紂至于孟津八百}
  - {type: page-break, offset: 57, content: '', id: KR2b0001_SBCK_002-2a}
  - {type: page-break, offset: 57, content: '', id: KR2b0001_SBCK_002-2b}
