  - {type: variant, offset: 97, length: 402, content: 堯有聖德封于唐夢攀天而上后稷放帝朱于丹水舜耕于歷夢眉長與髮等遂登庸命咎陶作刑三苗將亡天雨血夏有冰地坼及泉青龍生于廟日夜出晝日不出夏后氏禹禹都陽城黃帝至禹為三十世夏禹未遇夢乘舟月中過而後受虞室之禪禹立四十五年啟啟曰會益干啟位啟殺之九年舞九韶二十五年征西河二十九年陟年九十八太康太康居斟鄩乃失邦羿居斟鄩仲康相后相即位處商邱元年征淮夷畎夷二年征風夷及黃夷七年于夷來賓相居斟灌少康少康即位方夷來賓獻其樂舞帝杼帝杼居原自原遷于老邱柏杼子征于東海及三壽得一狐九尾后芬發后芬發即位二年九夷來御曰畎夷千夷方夷黃夷白夷赤夷元夷風夷陽夷洛伯用與河伯馮夷鬭后芬立四十四年后荒后荒即位元年以元珪賓于河命九東狩于海獲大魚后芒在位五十八年陟后泄王亥託于有易河伯僕牛殷王子亥賓于有易而淫焉有易之君緜臣殺而放之故殷上甲微假師于河伯以伐有易滅之遂殺其君緜臣后泄二十一年命畎夷白夷赤夷元夷風夷陽夷繇是服從陟不降不降即位六年伐九苑六十九年其弟, WYG: 𤼵代}
