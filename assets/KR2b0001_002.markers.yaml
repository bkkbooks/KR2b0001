  - {type: variant, offset: 532, length: 6, content: 祅孼十日並照, WYG: 火自天止於王屋流為赤烏烏銜榖焉榖者紀后稷之徳火者燔魚以告天天火流下應以告也遂東伐紂勝於牧野兵不血刃而天下歸之乃封吕尚於齊周徳既隆草木茂盛蒿堪為宫室因名蒿室既有天下遂都}
