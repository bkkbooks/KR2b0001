  - {type: variant, offset: 9, length: 10, content: 存真朱右曾輯錄汲冢紀, WYG: 卷下梁沈約注周武王名𤼵初髙辛氏之世妃曰姜嫄助祭郊禖見大人迹履之當時歆如有人道感己遂有身而生男以為不祥棄之隘巷羊牛避而不踐又送之山林之中會伐林者又取而置寒氷上大鳥以一翼藉覆之姜嫄以為異乃收養焉名之曰棄枝頥有異相長為堯稷官有功於民后稷之孫曰公劉有徳諸侯皆以天子之禮待之初黄帝之世䜟言曰西北為王期在甲子昌制命𤼵行誅旦行道及公劉之後十三世而生季歴季歴之十}
