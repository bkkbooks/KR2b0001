  - {type: variant, offset: 1389, length: 0, content: '', SBCK: 立受子祿父是爲武庚夏四月王歸于豐饗于太廟命監殷遂狩於管作大武樂十三年巢伯來賔薦殷于大廟遂大封諸侯秋大有年十四年王有疾周文公禱于壇墠作金縢十五年肅愼氏來賔初狩方岳誥于沫邑冬遷九鼎于洛十六年箕子來朝秋王師滅蒲姑十七年命王世子誦于東宮冬十有二月}
