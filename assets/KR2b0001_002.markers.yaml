  - {type: variant, offset: 70, length: 17, content: 臣左徹乃立顓頊顓頊產伯鯀是維若陽居, WYG: 文要曰姬受命昌来提撰爾洛鈐報在齊尚出游見赤人自洛出授尚書命曰召佐昌者子文王夢日月著其身又鷟鸑鳴於岐山孟春六句五緯聚房後有鳯凰銜書㳺文王之都書又曰殷帝無道虐亂}
