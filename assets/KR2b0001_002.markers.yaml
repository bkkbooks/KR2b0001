  - {type: variant, offset: 1397, length: 0, content: '', WYG: 名誦元年丁酉春正月王即位命冡宰周文公總百官庚午周公誥諸侯于皇門夏六月葬武王于畢秋王加元服武庚以殷叛周文公出居于東二年奄人徐人及淮夷入于邶以叛秋大雷電以風王逆周文公于郊遂伐殷三年王師滅殷殺武庚禄父遷殷民于衛遂伐奄滅蒲姑姑與四國作亂故周文公伐之四年春正月初朝于廟夏四月初甞麥王師伐淮夷遂入奄五年春正月王在奄遷其君于蒲姑夏五月王至自奄遷殷民于洛邑遂營成周六年大蒐于岐陽七年周公復政于王春二月王如豐三月召康公如洛度邑甲子周文公誥多士于成周遂城東都王如東都諸侯来朝冬王歸自東都立髙圉廟八年春正月王初蒞阼親政命魯侯禽父齊侯伋遷庶殷于魯作象舞冬十月王師滅唐遷其民于杜九年春正月有事于太廟初用勺肅慎氏来朝王使榮伯錫肅慎氏命十年王命唐慎虞為侯越裳氏来朝周文公出居于豐十一年春正月王如豐唐叔獻嘉禾王命唐叔歸禾于周文公王命周平公治東都約按周平公即君陳周公之子伯禽之弟十二年王師燕師城韓王錫韓侯命十三年王師會齊侯魯侯伐戎夏六月魯大禘于周公廟十四年秦師圍曲城克之冬洛邑告成十八年春正月王如洛邑定鼎鳯凰見遂有事于河武王沒成王少周公旦攝政七年制禮作樂神鳥鳯凰見蓂荚生乃與成王觀于河洛沈璧禮畢王退俟至于日昃榮光竝出幕河青雲浮至青龍臨壇銜𤣥甲之圖坐之而去禮于洛亦如之𤣥龜青龍蒼光止于壇背甲刻書赤文成字周公援筆以世文寫之書成文銷龜隨甲而去其言自周公訖于秦漢盛衰之符麒麟遊苑鳯凰翔庭成王援琴而歌曰鳯凰翺兮於紫庭余何徳兮以感靈賴先王兮恩澤臻于胥樂兮民以寧十九年王巡狩侯甸方岳召康公從歸于宗周遂正百官黜豐侯二十一年除治象周文公薨于豐二十二年葬周文公于畢二十四年於越来賓二十五年王大會諸侯于東都四夷来賔冬十月歸自東都大事于太廟三十年離戎来賓約按離戎驪山之戎也為林氏所伐告于成王三十三年王遊于卷阿召康公從歸于宗周命王世子釗如房逆女房伯祈歸于宗周三十四年雨金于咸陽約按咸陽天雨金三年國有大喪三十七年夏四月乙丑王陟}
