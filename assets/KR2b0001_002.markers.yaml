  - {type: variant, offset: 539, length: 355, content: 東陽其年允甲陟本有十日迭次而出運照無窮孔甲后昊后昊立三年后發后發一名后敬或曰發惠后發即位元年諸夷賓于王門冉保墉會于上池諸夷入舞其子立為傑后桀居斟鄩畎夷入居豳岐之閒不窋之晜孫后桀命扁伐岷山岷山莊王女于桀二人曰琬曰琰桀愛一人女無子焉斲其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰末喜氏築傾宮飾瑤臺作瓊室立玉門末喜氏以與伊尹交遂以閒夏築傾宮飾瑤臺社坼裂湯遂滅夏桀逃南巢氏凡夏自禹以至于桀十七王有王與無王用歲四百七十一年商湯湯有七名而九征外丙外丙勝即位居亳仲壬仲壬即位居毫命卿士伊尹伊尹祠桐宮歌曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷于聖賢莫不咸聽鼚乎鼓之軒乎舞之精華以竭褰裳去之仲壬崩立大甲伊尹放大甲于桐乃自立大甲伊尹即位放大甲七年大甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之伊尹年百有五歲大甲, WYG: 鎬}
